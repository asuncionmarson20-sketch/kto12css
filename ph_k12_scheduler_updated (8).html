<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PH K-12 School Class Scheduling System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;
  --accent:#f78166;--accent2:#58a6ff;--accent3:#3fb950;
  --accent4:#d2a8ff;--accent5:#ffa657;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --danger:#f85149;--success:#238636;
  --radius:8px;--radius-lg:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
h1,h2,h3,h4,h5,h6{font-family:'Syne',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:14px}
button{font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
a{color:var(--accent2);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Layout */
#root{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{flex-shrink:0;background:linear-gradient(135deg,#161b22 0%,#1c2128 100%);border-bottom:1px solid var(--border);z-index:100}
.topbar-banner{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(247,129,102,0.12),rgba(88,166,255,0.08),rgba(63,185,80,0.08));border-bottom:1px solid rgba(255,255,255,0.04)}
.topbar-banner-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent5));display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-title h1{font-size:15px;font-weight:700;color:var(--text);letter-spacing:0.3px}
.topbar-title p{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-bar{padding:6px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-bar-left{display:flex;align-items:center;gap:8px}
.page-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text)}
.breadcrumb{font-size:11px;color:var(--text3)}
.topbar-bar-right{display:flex;align-items:center;gap:8px}

.app-body{flex:1;display:flex;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-nav{padding:8px}
.sidebar-section{margin-bottom:4px}
.sidebar-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:all .15s;position:relative;font-size:13px;color:var(--text2);font-weight:500}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(247,129,102,0.15);color:var(--accent)}
.nav-icon{width:18px;text-align:center;font-size:14px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px}

.main-content{flex:1;overflow-y:auto;background:var(--bg)}
.page-content{padding:20px;max-width:1400px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--text)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#e56e55}
.btn-secondary{background:var(--bg3);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--text3)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#2ea043}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#da3633}
.btn-info{background:rgba(88,166,255,0.15);color:var(--accent2);border-color:rgba(88,166,255,0.3)}
.btn-info:hover{background:rgba(88,166,255,0.25)}
.btn-warn{background:rgba(255,166,87,0.15);color:var(--accent5);border-color:rgba(255,166,87,0.3)}
.btn-warn:hover{background:rgba(255,166,87,0.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* Form inputs */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent2)}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-blue{background:rgba(88,166,255,0.15);color:var(--accent2)}
.tag-green{background:rgba(63,185,80,0.15);color:var(--accent3)}
.tag-purple{background:rgba(210,168,255,0.15);color:var(--accent4)}
.tag-orange{background:rgba(255,166,87,0.15);color:var(--accent5)}
.tag-red{background:rgba(248,81,73,0.15);color:var(--danger)}
.tag-gray{background:var(--bg4);color:var(--text2)}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,0.6);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-weight:500}
.pill-inactive{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.pill-active{background:rgba(63,185,80,0.2);color:var(--accent3);border-color:rgba(63,185,80,0.4)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:600px;width:100%;max-height:90vh;display:flex;flex-direction:column}
.modal-lg{max-width:900px}
.modal-xl{max-width:1100px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0}
.modal-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s}
.modal-close:hover{color:var(--text)}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;pointer-events:all;animation:slideIn .2s ease;min-width:260px;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:#1a3a1a;border:1px solid var(--accent3);color:var(--accent3)}
.toast-error{background:#3a1a1a;border:1px solid var(--danger);color:var(--danger)}
.toast-info{background:#1a2a3a;border:1px solid var(--accent2);color:var(--accent2)}
.toast-warn{background:#3a2a1a;border:1px solid var(--accent5);color:var(--accent5)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Color classes for schedule blocks */
.color-0{background:linear-gradient(135deg,#f78166,#e05a3a)}
.color-1{background:linear-gradient(135deg,#58a6ff,#1f6feb)}
.color-2{background:linear-gradient(135deg,#3fb950,#2ea043)}
.color-3{background:linear-gradient(135deg,#d2a8ff,#a371f7)}
.color-4{background:linear-gradient(135deg,#ffa657,#e08c3a)}
.color-5{background:linear-gradient(135deg,#79c0ff,#388bfd)}
.color-6{background:linear-gradient(135deg,#56d364,#26a641)}
.color-7{background:linear-gradient(135deg,#ff7b72,#f85149)}
.color-8{background:linear-gradient(135deg,#e3b341,#d4a017)}
.color-9{background:linear-gradient(135deg,#f0883e,#db6d28)}

/* Conflict alert */
.conflict-alert{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--danger)}

/* Search bar */
.search-bar{position:relative;display:flex;align-items:center}
.search-bar input{padding:7px 10px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:220px}
.search-bar input:focus{outline:none;border-color:var(--accent2)}
.search-icon{position:absolute;left:10px;color:var(--text3);font-size:13px;pointer-events:none}

/* Dashboard stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.c0::before{background:linear-gradient(90deg,var(--accent),var(--accent5))}
.stat-card.c1::before{background:linear-gradient(90deg,var(--accent2),var(--accent4))}
.stat-card.c2::before{background:linear-gradient(90deg,var(--accent3),#79c0ff)}
.stat-card.c3::before{background:linear-gradient(90deg,var(--accent4),var(--accent2))}
.stat-card.c4::before{background:linear-gradient(90deg,var(--accent5),var(--accent))}
.stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin:8px 0 4px}
.stat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.stat-icon{position:absolute;top:14px;right:14px;font-size:22px;opacity:0.3}

/* Progress bar */
.progress-bar{background:var(--bg4);border-radius:10px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width .3s}

/* Grid utils */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.flex-1{flex:1}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-danger{color:var(--danger)}.text-success{color:var(--accent3)}.text-muted{color:var(--text2)}
.fw-600{font-weight:600}.fw-700{font-weight:700}

/* SY Widget */
.sy-widget{position:relative}
.sy-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--text)}
.sy-btn:hover{background:rgba(255,255,255,0.1)}
.sy-edit-label{color:var(--accent5);font-size:10px;font-weight:700}
.sy-popover{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;width:300px;box-shadow:0 16px 48px rgba(0,0,0,0.5);z-index:500}

/* Period badge */
.period-badge{padding:4px 10px;background:rgba(88,166,255,0.12);border:1px solid rgba(88,166,255,0.25);border-radius:20px;font-size:11px;font-weight:600;color:var(--accent2)}

/* Timetable */
.timetable-wrap{overflow:auto;position:relative}
.timetable-grid{display:grid;min-width:800px}
.tt-header{background:var(--bg3);padding:8px 12px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.tt-time-col{background:var(--bg3);padding:4px 8px;font-size:10px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid rgba(48,54,61,0.4);text-align:right;position:sticky;left:0;z-index:5;white-space:nowrap}
.tt-cell{border-right:1px solid rgba(48,54,61,0.4);border-bottom:1px solid rgba(48,54,61,0.3);position:relative;background:var(--bg)}
.tt-block{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 6px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.3);transition:opacity .15s}
.tt-block:hover{opacity:0.85}
.tt-block-title{font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tt-block-sub{font-size:9px;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tt-block-remove{position:absolute;top:2px;right:3px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;padding:0}
.tt-block:hover .tt-block-remove{opacity:1}
.tt-lunch-block{position:absolute;left:0;right:0;background:repeating-linear-gradient(45deg,rgba(255,166,87,0.08),rgba(255,166,87,0.08) 4px,transparent 4px,transparent 10px);border-top:1px dashed rgba(255,166,87,0.4);border-bottom:1px dashed rgba(255,166,87,0.4);display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.tt-lunch-label{font-size:10px;color:rgba(255,166,87,0.7);font-weight:600;letter-spacing:1px}

/* AI Log */
.ai-log{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;height:300px;overflow-y:auto;font-family:monospace;font-size:12px}
.log-ok{color:var(--accent3)}.log-warn{color:var(--accent5)}.log-err{color:var(--danger)}.log-info{color:var(--text2)}

/* Report preview */
.report-preview{background:#fff;color:#000;padding:20mm;font-family:Arial,sans-serif;font-size:11pt;min-height:297mm;width:210mm;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.4)}
.report-header{text-align:center;margin-bottom:16px}
.report-logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.report-logo{font-size:36px;width:50px;text-align:center}
.report-header-center{flex:1;text-align:center}
.report-gov-text{font-size:8pt;color:#444;margin-bottom:2px}
.report-school-name{font-size:14pt;font-weight:700;text-transform:uppercase}
.report-address{font-size:8pt;color:#444;margin-top:2px}
.report-title-banner{background:#000;color:#fff;text-align:center;padding:6px;font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px}
.report-badges{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.report-badge{padding:3px 12px;border:1px solid #333;font-size:9pt;font-weight:600;border-radius:3px}
.report-table{width:100%;border-collapse:collapse;font-size:9pt}
.report-table th{background:#333;color:#fff;padding:6px 8px;text-align:center;border:1px solid #555}
.report-table td{padding:5px 8px;border:1px solid #ccc;text-align:center}
.report-table tr:nth-child(even) td{background:#f9f9f9}
.report-signatory-row{display:flex;justify-content:space-around;margin-top:40px}
.report-signatory{text-align:center;min-width:150px}
.report-signatory-line{border-top:1px solid #333;padding-top:6px;margin-top:30px;font-weight:700;font-size:10pt}
.report-signatory-pos{font-size:9pt;color:#444}

/* Print styles */
@media print{
  .no-print{display:none!important}
  .topbar{display:none!important}
  .sidebar{display:none!important}
  .main-content{overflow:visible!important}
  body{background:#fff}
  .report-preview{box-shadow:none;margin:0;padding:15mm;width:100%}
}

/* Day toggle */
.day-toggle{display:flex;gap:4px;flex-wrap:wrap}
.day-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.day-btn.active{background:rgba(63,185,80,0.2);border-color:rgba(63,185,80,0.5);color:var(--accent3)}

/* Filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.filter-select{padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px}
.filter-select:focus{outline:none;border-color:var(--accent2)}

/* Completion bar */
.completion-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.completion-label{font-size:12px;font-weight:600;color:var(--text);min-width:100px}
.completion-pct{font-size:11px;color:var(--text2);min-width:36px;text-align:right}

/* Subject quick-fills colors */
.sq-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;margin:2px}
.sq-chip.sel{opacity:1;border-color:rgba(255,255,255,0.3)}
.sq-chip.unsel{opacity:0.45}

/* Drag active */
.dragging{opacity:0.5;cursor:grabbing}
.drop-target{background:rgba(88,166,255,0.1)!important}

/* Lunch settings */
.lunch-setting-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,166,87,0.08);border:1px solid rgba(255,166,87,0.2);border-radius:var(--radius);margin-bottom:12px}

/* Print preview modal */
.print-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:2000;display:flex;flex-direction:column;overflow:hidden}
.print-preview-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.print-preview-body{flex:1;overflow-y:auto;padding:20px;background:#444}
.print-preview-footer{background:var(--bg2);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0}

/* Checklist */
.check-list{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);font-size:13px}
.check-item input{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ===================== CONSTANTS ===================== */

/* ===================== TIME HELPERS ===================== */
const fmtTime=(totalMinutes)=>{
  const h=Math.floor(totalMinutes/60);
  const m=totalMinutes%60;
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return h12+':'+(m<10?'0':'')+m+' '+ampm;
};

const generateTimeSlots=(ts)=>{
  const slots=[];
  const startMin=ts.startHour*60+ts.startMinute;
  const endMin=ts.endHour*60+ts.endMinute;
  const breakPeriods=[];
  if(ts.breaks&&ts.breaks.length>0){
    ts.breaks.filter(b=>b.enabled).forEach(b=>{
      const bs=b.startHour*60+b.startMinute;
      breakPeriods.push({start:bs,end:bs+b.durationMinutes});
    });
  } else if(ts.lunchEnabled){
    const ls=ts.lunchStartHour*60+ts.lunchStartMinute;
    const le=ts.lunchEndHour*60+ts.lunchEndMinute;
    breakPeriods.push({start:ls,end:le});
  }
  const isBreak=(s,e)=>breakPeriods.some(b=>s<b.end&&e>b.start);
  const jumpOverBreaks=(cur)=>{
    let c=cur;
    let jumped=true;
    while(jumped){
      jumped=false;
      for(const b of breakPeriods){
        if(c>=b.start&&c<b.end){c=b.end;jumped=true;}
      }
    }
    return c;
  };
  let cur=startMin;
  while(cur<endMin){
    cur=jumpOverBreaks(cur);
    if(cur>=endMin)break;
    const slotEnd=cur+ts.defaultSlotMinutes;
    if(slotEnd>endMin)break;
    if(!isBreak(cur,slotEnd)){
      slots.push({label:fmtTime(cur)+' - '+fmtTime(slotEnd),startMin:cur,endMin:slotEnd});
    }
    cur=slotEnd;
  }
  return slots;
};

const parseSlotLabel=(label)=>{
  const parts=label.split(' - ');
  if(parts.length!==2)return null;
  const parseT=(s)=>{
    const [time,ampm]=s.trim().split(' ');
    const [hStr,mStr]=time.split(':');
    let h=parseInt(hStr);
    const m=parseInt(mStr);
    if(ampm==='PM'&&h!==12)h+=12;
    if(ampm==='AM'&&h===12)h=0;
    return h*60+m;
  };
  return{startMin:parseT(parts[0]),endMin:parseT(parts[1])};
};

// Strict overlap: touching boundaries (end of one == start of next) are NOT overlapping
const slotsOverlap=(s1,e1,s2,e2)=>s1<e2&&e1>s2&&!(e1===s2||e2===s1);
const isOverlapping=(lA,lB)=>{
  const a=parseSlotLabel(lA),b=parseSlotLabel(lB);
  if(!a||!b)return false;
  return slotsOverlap(a.startMin,a.endMin,b.startMin,b.endMin);
};

/* ===================== CONFLICT DETECTION ===================== */
const detectConflicts=(schedules)=>{
  const conflicts=[];
  for(let i=0;i<schedules.length;i++){
    for(let j=i+1;j<schedules.length;j++){
      const a=schedules[i],b=schedules[j];
      if(a.day!==b.day)continue;
      if(!isOverlapping(a.timeSlot,b.timeSlot))continue;
      // Teacher double-booked
      if(a.teacherId&&b.teacherId&&a.teacherId===b.teacherId){
        conflicts.push({type:'teacher',ids:[a.id,b.id],msg:'Teacher conflict: same teacher at same time'});
      }
      // Room double-booked
      if(a.roomId&&b.roomId&&a.roomId===b.roomId){
        conflicts.push({type:'room',ids:[a.id,b.id],msg:'Room conflict: same room at same time'});
      }
      // Section double-booked
      if(a.sectionId&&b.sectionId&&a.sectionId===b.sectionId){
        conflicts.push({type:'section',ids:[a.id,b.id],msg:'Section conflict: same section at same time'});
      }
    }
  }
  return conflicts;
};

/* ===================== AI SCHEDULER ===================== */
const runAIScheduler=(sections,subjects,teachers,rooms,existing,timeSettings,targetSectionIds)=>{
  const log=[];
  const schedules=[...existing];
  let placed=0,skipped=0;
  const slots=generateTimeSlots(timeSettings);
  const targetSecs=targetSectionIds.length>0?sections.filter(s=>targetSectionIds.includes(s.id)):sections;

  const teacherLoad={};
  teachers.forEach(t=>{teacherLoad[t.id]={hoursUsed:0,dayCount:{}};});
  existing.forEach(s=>{
    if(!teacherLoad[s.teacherId])return;
    const p=parseSlotLabel(s.timeSlot);
    if(p){
      const hrs=(p.endMin-p.startMin)/60;
      teacherLoad[s.teacherId].hoursUsed+=hrs;
      teacherLoad[s.teacherId].dayCount[s.day]=(teacherLoad[s.teacherId].dayCount[s.day]||0)+1;
    }
  });

  const isConflict=(day,timeSlot,teacherId,roomId,sectionId)=>{
    const p=parseSlotLabel(timeSlot);
    if(!p)return true;
    for(const s of schedules){
      if(s.day!==day)continue;
      const sp=parseSlotLabel(s.timeSlot);
      if(!sp)continue;
      if(!slotsOverlap(p.startMin,p.endMin,sp.startMin,sp.endMin))continue;
      if(teacherId&&s.teacherId===teacherId)return true;
      if(roomId&&s.roomId===roomId)return true;
      if(sectionId&&s.sectionId===sectionId)return true;
    }
    return false;
  };

  for(const section of targetSecs){
    const sectionSubjects=subjects.filter(sub=>
      sub.gradeLevel===section.gradeLevel&&(sub.strand===''||sub.strand===section.strand)
    );
    log.push({type:'info',msg:'-- Section: '+section.name+' ('+sectionSubjects.length+' subjects) --'});

    for(const subj of sectionSubjects){
      const needed=subj.hoursPerWeek;
      let placed_this=0;
      const existingCount=schedules.filter(s=>s.sectionId===section.id&&s.subjectId===subj.id).length;
      if(existingCount>=needed){
        log.push({type:'info',msg:'  '+subj.name+': already fulfilled ('+existingCount+'/'+needed+')'});
        continue;
      }
      const remaining=needed-existingCount;

      const eligibleTeachers=teachers.filter(t=>{
        if(!t.subjects.includes(subj.id))return false;
        const days=(t.subjectAvailability&&t.subjectAvailability[subj.id])||t.availability||DAYS;
        return days.length>0;
      }).sort((a,b)=>(teacherLoad[a.id]?.hoursUsed||0)-(teacherLoad[b.id]?.hoursUsed||0));
      if(eligibleTeachers.length===0){
        log.push({type:'warn',msg:'  '+subj.name+': no eligible teacher'});
        skipped++;continue;
      }

      const isLabSubject=subj.name.toLowerCase().includes('science')||subj.name.toLowerCase().includes('computer');
      const preferredRoomType=isLabSubject?['Laboratory','Computer Lab']:['Classroom'];
      const sortedRooms=[...rooms].sort((a,b)=>{
        const ap=preferredRoomType.includes(a.type)?0:1;
        const bp=preferredRoomType.includes(b.type)?0:1;
        return ap-bp;
      });

      let placedCount=0;
      const allowedDays=(subj.scheduleDays&&subj.scheduleDays.length>0)?subj.scheduleDays:DAYS;
      outer: for(const day of allowedDays){
        if(placedCount>=remaining)break;
        for(const teacher of eligibleTeachers){
          const teacherSubjDays=(teacher.subjectAvailability&&teacher.subjectAvailability[subj.id])||teacher.availability||DAYS;
          if(!teacherSubjDays.includes(day))continue;
          const tl=teacherLoad[teacher.id];
          if(tl.hoursUsed>=(teacher.maxHoursPerWeek||30))continue;
          if((tl.dayCount[day]||0)>=(teacher.maxClassesPerDay||6))continue;
          for(const slot of slots){
            if(placedCount>=remaining)break outer;
            for(const room of sortedRooms){
              if(!isConflict(day,slot.label,teacher.id,room.id,section.id)){
                const newSched={id:uid(),sectionId:section.id,subjectId:subj.id,teacherId:teacher.id,roomId:room.id,day,timeSlot:slot.label};
                schedules.push(newSched);
                const hrs=(slot.endMin-slot.startMin)/60;
                tl.hoursUsed+=hrs;
                tl.dayCount[day]=(tl.dayCount[day]||0)+1;
                placedCount++;placed++;
                log.push({type:'ok',msg:'  ✓ '+subj.name+' → '+teacher.name+' | '+room.name+' | '+day+' '+slot.label});
                break;
              }
            }
          }
        }
      }
      if(placedCount<remaining){
        log.push({type:'warn',msg:'  ⚠ '+subj.name+': placed '+placedCount+'/'+remaining+' sessions'});
        if(placedCount===0)skipped++;
      }
    }
  }
  const conflicts=detectConflicts(schedules.filter(s=>!existing.find(e=>e.id===s.id)));
  return{schedules,log,placed,skipped,conflicts};
};

    const relevant=subjects.filter(s=>s.gradeLevel===section.gradeLevel&&(s.strand===''||s.strand===section.strand));
    if(relevant.length===0)return{pct:0,placed:0,total:0};
    let total=0,placed=0;
    relevant.forEach(sub=>{
      total+=sub.hoursPerWeek;
      placed+=schedules.filter(sc=>sc.sectionId===section.id&&sc.subjectId===sub.id).length;
    });
    return{pct:total>0?Math.min(100,Math.round(placed/total*100)):0,placed,total};
  };

    const teachingHrs=schedules.filter(s=>s.teacherId===t.id).reduce((acc,s)=>{
      const p=parseSlotLabel(s.timeSlot);
      return acc+(p?(p.endMin-p.startMin)/60:0);

                </div>
                <span className="completion-pct" style={{color:clr}}>{pct}%</span>
                <span style={{fontSize:11,color:'var(--text3)',minWidth:60}}>{placed}/{total} sessions</span>
              </div>
            );
          })}
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">👩‍🏫 Teacher Workload</span>
            <span className="tag tag-green">{teachers.length} teachers</span>
          </div>
          {teachers.length===0&&<p className="text-muted text-sm">No teachers yet.</p>}
          {teachers.map(t=>{
            const{hrs,pct}=teacherWorkload(t);
            const clr=pct>=90?'var(--danger)':pct>=60?'var(--accent5)':'var(--accent2)';
            return(
              <div key={t.id} className="completion-row">
                <span className="completion-label">{t.name.split(' ')[0]}</span>
                <div className="progress-bar" style={{flex:1}}>
                  <div className="progress-fill" style={{width:pct+'%',background:clr}}/>
                </div>
                <span className="completion-pct" style={{color:clr}}>{hrs.toFixed(1)}h</span>
                <span style={{fontSize:11,color:'var(--text3)',minWidth:50}}>/{t.maxHoursPerWeek}h</span>
              </div>
            );
          })}
        </div>
      </div>

      {conflicts.length>0&&(
        <div className="card mt-16">
          <div className="card-header">
            <span className="card-title text-danger">⚠ Conflicts Detected</span>
            <span className="tag tag-red">{conflicts.length}</span>
          </div>
          {conflicts.slice(0,6).map((c,i)=>(
            <div key={i} className="conflict-alert">{c.type.toUpperCase()}: {c.msg}</div>
          ))}
          {conflicts.length>6&&<p className="text-muted text-sm">+ {conflicts.length-6} more conflicts...</p>}
        </div>
      )}
    </div>
  );
};

/* ===================== TEACHERS PAGE ===================== */
const TeachersPage=({teachers,setTeachers,subjects,schedules,timeSettings,toast})=>{

      <div className="card">

                  <td>
                    <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>

                        const sub=subjects.find(s=>s.id===sid);

                      })}
                      {t.subjects.length===0&&<span className="text-muted text-xs">None</span>}
                    </div>
                  </td>
                  <td>
                    {(t.responsibilities||[]).length>0
                      ?<div style={{display:'flex',flexDirection:'column',gap:2}}>
                          {(t.responsibilities||[]).map((r,i)=>(
                            <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                              <span style={{fontSize:10,padding:'1px 6px',borderRadius:10,background:'rgba(255,166,87,0.12)',color:'var(--accent5)',border:'1px solid rgba(255,166,87,0.25)',fontWeight:600,whiteSpace:'nowrap'}}>{r.label}</span>

                  </td>
                  <td>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {t.subjects.map(sid=>{

                            <div style={{display:'flex',gap:2}}>
                              {DAYS.map(d=><span key={d} style={{fontSize:9,padding:'1px 4px',borderRadius:3,fontWeight:700,background:days.includes(d)?'rgba(63,185,80,0.2)':'rgba(100,100,100,0.1)',color:days.includes(d)?'var(--accent3)':'var(--text3)',border:'1px solid '+(days.includes(d)?'rgba(63,185,80,0.4)':'transparent')}}>{d.slice(0,3)}</span>)}

                        {status==='ok'&&<span style={{fontSize:10,fontWeight:700,color:'var(--accent3)',background:'rgba(63,185,80,0.12)',padding:'1px 7px',borderRadius:10}}>✓ OK</span>}
                      </div>
                      <div style={{display:'flex',gap:12,marginTop:2,fontSize:11,color:'var(--text2)'}}>
                        <span><strong style={{color:'var(--text)'}}>{totalHrs.toFixed(1)}h</strong> total load</span>
                        <span style={{color:'var(--text3)'}}>({teachingHrs.toFixed(1)}h teaching{respHrs>0?' + '+respHrs.toFixed(1)+'h roles':''})</span>
                        <span>/ <strong style={{color:'var(--text)'}}>{maxHrs}h</strong> max</span>

                      </div>
                      <span style={{fontSize:12,fontWeight:700,color:barColor,minWidth:38}}>{pct}%</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:subjIds.length>0?6:0}}>
                    {DAYS.map(d=>{
                      const dh=dayHrs[d]||0;

                        <div key={d} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:46,padding:'4px 5px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--border)'}}>

          </div>

      {editing&&(

                  <label className="form-label">Max Classes/Subject/Week</label>

                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {subjects.map(s=>{
                    const assigned=editing.subjects.includes(s.id);
                    const days=(editing.subjectAvailability&&editing.subjectAvailability[s.id])||[...DAYS];
                    const toggleSubjDay=(d)=>setEditing(v=>{
                      const cur=(v.subjectAvailability&&v.subjectAvailability[s.id])||[...DAYS];
                      const next=cur.includes(d)?cur.filter(x=>x!==d):[...cur,d];
                      return{...v,subjectAvailability:{...v.subjectAvailability,[s.id]:next}};
                    });
                    return(
                      <div key={s.id} style={{border:'1px solid '+(assigned?'rgba(88,166,255,0.35)':'var(--border)'),borderRadius:8,padding:'8px 10px',background:assigned?'rgba(88,166,255,0.05)':'var(--bg3)',transition:'all .15s'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:assigned?6:0}}>

                        )}

                    );
                  })}
                </div>
              </div>
              {/* ── Responsibilities / Additional Roles ── */}
              <div className="form-group" style={{marginTop:4}}>
                <label className="form-label">Additional Roles & Responsibilities</label>
                <p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Each role adds hours to the teacher's weekly load. Click a preset or add a custom one.</p>

                      <button key={p.label} onClick={()=>{

                        setEditing(v=>({...v,responsibilities:[...(v.responsibilities||[]),{id:uid(),label:p.label,hoursPerWeek:p.hoursPerWeek}]}));
                      }} style={{padding:'3px 10px',borderRadius:20,border:'1px solid '+(already?'var(--accent3)':'var(--border)'),background:already?'rgba(63,185,80,0.1)':'var(--bg3)',color:already?'var(--accent3)':'var(--text2)',fontSize:11,cursor:already?'default':'pointer',fontWeight:600,transition:'all .15s'}}>
                        {already?'✓ ':''}{p.label} · {p.hoursPerWeek}h
                      </button>
                    );
                  })}
                </div>
                {/* Current responsibilities list */}
                {(editing.responsibilities||[]).length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:8}}>
                    {(editing.responsibilities||[]).map((r,i)=>(
                      <div key={r.id||i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:7,background:'var(--bg3)',border:'1px solid var(--border)'}}>
                        <span style={{flex:1,fontSize:12,fontWeight:600,color:'var(--text)'}}>{r.label}</span>
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          <input type="number" min={0.5} max={20} step={0.5} value={r.hoursPerWeek} onChange={e=>setEditing(v=>({...v,responsibilities:v.responsibilities.map((x,j)=>j===i?{...x,hoursPerWeek:+e.target.value}:x)}))}
                            style={{width:48,padding:'2px 6px',borderRadius:5,border:'1px solid var(--border)',background:'var(--bg4)',color:'var(--text)',fontSize:12,textAlign:'center'}}/>
                          <span style={{fontSize:11,color:'var(--text3)'}}>h/wk</span>
                        </div>
                        <button onClick={()=>setEditing(v=>({...v,responsibilities:v.responsibilities.filter((_,j)=>j!==i)}))} style={{background:'none',border:'none',cursor:'pointer',color:'var(--danger)',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                {/* Custom role add */}
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <input id={'custom-role-'+editing.id} placeholder="Custom role name..." style={{flex:1,padding:'6px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text)',fontSize:12}} onKeyDown={e=>{
                    if(e.key==='Enter'&&e.target.value.trim()){
                      setEditing(v=>({...v,responsibilities:[...(v.responsibilities||[]),{id:uid(),label:e.target.value.trim(),hoursPerWeek:1}]}));
                      e.target.value='';
                    }
                  }}/>
                  <span style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap'}}>Press Enter to add</span>
                </div>
                {(editing.responsibilities||[]).length>0&&(
                  <div style={{marginTop:8,padding:'6px 10px',background:'rgba(88,166,255,0.06)',borderRadius:6,border:'1px solid rgba(88,166,255,0.15)',fontSize:11,color:'var(--accent2)'}}>
                    📋 Total responsibility load: <strong>{(editing.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0)}h/week</strong>
                  </div>
                )}
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={()=>setEditing(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={save}>💾 {editing.id?'Save Changes':'Add Teacher'}</button>
          </div>
        </div>
      )}

      <ConfirmModal open={!!confirm} title="Delete Teacher" msg={'Delete "'+confirm?.name+'"? This cannot be undone.'} onConfirm={()=>del(confirm.id)} onCancel={()=>setConfirm(null)}/>
    </div>
  );
};

/* ===================== SUBJECTS PAGE ===================== */

    const ms=s.name.toLowerCase().includes(search.toLowerCase());

          </select>
          <div className="search-bar">
            <span className="search-icon">🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search subjects..."/>
          </div>
          <button className="btn btn-primary" onClick={()=>setEditing({...empty})}>+ Add Subject</button>
        </div>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Grade Level</th><th>Strand</th><th>Sessions/Week</th><th>Duration</th><th>Schedule Days</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No subjects found.</td></tr>}
              {filtered.map(s=>(
                <tr key={s.id}>
                  <td><strong>{s.name}</strong></td>
                  <td><span className="tag tag-blue">{s.gradeLevel}</span></td>
                  <td>{s.strand?<span className="tag tag-purple">{s.strand}</span>:<span className="text-muted text-xs">—</span>}</td>
                  <td>{s.hoursPerWeek}×/wk</td>
                  <td>{s.durationMinutes} min</td>
                  <td>
                    <div className="day-toggle">
                      {DAYS.map(d=>(
                        <span key={d} className={'pill '+((s.scheduleDays||DAYS).includes(d)?'pill-active':'pill-inactive')}>{d.slice(0,3)}</span>
                      ))}
                    </div>
                  </td>
                  <td>
                    <div className="flex gap-8">
                      <button className="btn btn-secondary btn-xs" onClick={()=>setEditing({...s,scheduleDays:s.scheduleDays||[...DAYS]})}>Edit</button>
                      <button className="btn btn-danger btn-xs" onClick={()=>setConfirm(s)}>Del</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing.id?'Edit Subject':'Add Subject'}</span>
              <button className="modal-close" onClick={()=>setEditing(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Subject Name *</label>
                <input className="form-input" value={editing.name} onChange={e=>setEditing(v=>({...v,name:e.target.value}))} placeholder="e.g. Mathematics"/>
              </div>
              <div className="grid-2">
                <div className="form-group">
                  <label className="form-label">Grade Level</label>
                  <select className="form-select" value={editing.gradeLevel} onChange={e=>setEditing(v=>({...v,gradeLevel:e.target.value,strand:isJHS(e.target.value)?'':v.strand}))}>
                    {GRADE_LEVELS.map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">SHS Strand</label>
                  <select className="form-select" value={editing.strand} onChange={e=>setEditing(v=>({...v,strand:e.target.value}))} disabled={isJHS(editing.gradeLevel)}>
                    <option value="">All Strands (Core)</option>
                    {SHS_STRANDS.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid-2">
                <div className="form-group">
                  <label className="form-label">Sessions per Week</label>
                  <input type="number" className="form-input" value={editing.hoursPerWeek} onChange={e=>setEditing(v=>({...v,hoursPerWeek:+e.target.value}))} min={1} max={10}/>
                </div>
                <div className="form-group">
                  <label className="form-label">Duration (minutes)</label>
                  <select className="form-select" value={editing.durationMinutes} onChange={e=>setEditing(v=>({...v,durationMinutes:+e.target.value}))}>
                    {DURATION_OPTIONS.map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">📅 Schedule Days <span style={{fontWeight:400,color:'var(--text3)',fontSize:11,textTransform:'none'}}>— Select which days of the week this subject is taught</span></label>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
                  {DAYS.map(d=>{
                    const active=(editing.scheduleDays||DAYS).includes(d);
                    return(
                      <button key={d} type="button"
                        style={{
                          padding:'8px 14px',borderRadius:8,border:'2px solid',cursor:'pointer',
                          fontWeight:700,fontSize:13,transition:'all .15s',
                          background:active?'rgba(63,185,80,0.2)':'var(--bg3)',
                          borderColor:active?'var(--accent3)':'var(--border)',
                          color:active?'var(--accent3)':'var(--text2)'
                        }}
                        onClick={()=>{
                          const cur=editing.scheduleDays||[...DAYS];
                          const next=cur.includes(d)?cur.filter(x=>x!==d):[...cur,d];
                          setEditing(v=>({...v,scheduleDays:next}));
                        }}
                      >
                        {d.slice(0,3)}
                        {active&&<span style={{marginLeft:4,fontSize:10}}>✓</span>}
                      </button>
                    );
                  })}
                </div>
                {(editing.scheduleDays||DAYS).length===0&&(
                  <div style={{marginTop:6,fontSize:11,color:'var(--danger)'}}>⚠ Please select at least one day.</div>
                )}
                {(editing.scheduleDays||DAYS).length>0&&(editing.scheduleDays||DAYS).length<editing.hoursPerWeek&&(
                  <div style={{marginTop:6,fontSize:11,color:'var(--accent5)'}}>
                    ⚠ {editing.hoursPerWeek} sessions/week but only {(editing.scheduleDays||DAYS).length} day(s) selected — not enough to cover all sessions.
                  </div>
                )}
                {(editing.scheduleDays||DAYS).length>=editing.hoursPerWeek&&(
                  <div style={{marginTop:6,fontSize:11,color:'var(--accent3)'}}>
                    ✓ {(editing.scheduleDays||DAYS).length} day(s) selected · {editing.hoursPerWeek} sessions/week — OK
                  </div>
                )}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditing(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Save Subject</button>
            </div>
          </div>
        </div>
      )}

      <ConfirmModal open={!!confirm} title="Delete Subject" msg={'Delete "'+confirm?.name+'"?'} onConfirm={()=>{setSubjects(ss=>ss.filter(s=>s.id!==confirm.id));toast('Subject deleted','success');setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
    </div>
  );
};

/* ===================== SECTIONS PAGE ===================== */
const SectionsPage=({sections,setSections,teachers,subjects,toast})=>{
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [subjectToAdd,setSubjectToAdd]=useState('');
  const [unitsToAdd,setUnitsToAdd]=useState(3);
  const [copyFromId,setCopyFromId]=useState('');
  const empty={id:'',name:'',gradeLevel:'Grade 7',strand:'',adviser:'',sectionSubjects:[]};
  const isJHS=(g)=>['Grade 7','Grade 8','Grade 9','Grade 10'].includes(g);

  // Check if a teacher is already an adviser of another section (excluding current editing)
  const getAdviserConflict=(teacherId)=>{
    if(!teacherId)return null;
    const conflict=sections.find(s=>s.adviser===teacherId&&s.id!==editing?.id);
    return conflict||null;
  };

  const save=()=>{
    if(!editing.name.trim()){toast('Name required','error');return;}
    // Block save if adviser conflict
    if(editing.adviser&&getAdviserConflict(editing.adviser)){
      const conflict=getAdviserConflict(editing.adviser);
      toast('⚠ '+teachers.find(t=>t.id===editing.adviser)?.name+' is already adviser of '+conflict.name,'error');
      return;
    }
    const toSave={...editing,sectionSubjects:editing.sectionSubjects||[]};
    if(editing.id){setSections(ss=>ss.map(s=>s.id===editing.id?toSave:s));toast('Section updated','success');}
    else{setSections(ss=>[...ss,{...toSave,id:uid()}]);toast('Section added','success');}
    setEditing(null);
  };

  const addSubjectToSection=()=>{
    if(!subjectToAdd){toast('Select a subject first','error');return;}
    const cur=editing.sectionSubjects||[];
    if(cur.some(x=>x.subjectId===subjectToAdd)){toast('Subject already added','warn');return;}
    setEditing(v=>({...v,sectionSubjects:[...cur,{subjectId:subjectToAdd,units:unitsToAdd}]}));
    setSubjectToAdd('');
    setUnitsToAdd(3);
  };

  const removeSubjectFromSection=(subjectId)=>{
    setEditing(v=>({...v,sectionSubjects:(v.sectionSubjects||[]).filter(x=>x.subjectId!==subjectId)}));
  };

  const updateUnits=(subjectId,units)=>{
    setEditing(v=>({...v,sectionSubjects:(v.sectionSubjects||[]).map(x=>x.subjectId===subjectId?{...x,units}:x)}));
  };

  const copySubjectsFrom=(fromId)=>{
    if(!fromId)return;
    const src=sections.find(s=>s.id===fromId);
    if(!src||(src.sectionSubjects||[]).length===0){toast('No subjects to copy from that section','warn');return;}
    // Merge: keep existing, add missing ones from source
    const cur=editing.sectionSubjects||[];
    const toAdd=(src.sectionSubjects||[]).filter(ss=>!cur.some(x=>x.subjectId===ss.subjectId));
    if(toAdd.length===0){toast('All subjects already added','warn');return;}
    setEditing(v=>({...v,sectionSubjects:[...cur,...toAdd]}));
    toast('Copied '+toAdd.length+' subject(s) from '+src.name,'success');
    setCopyFromId('');
  };

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Sections</h2>
          <p className="text-muted text-sm mt-8">{sections.length} section(s) defined</p>
        </div>
        <button className="btn btn-primary" onClick={()=>{setSubjectToAdd('');setUnitsToAdd(3);setCopyFromId('');setEditing({...empty});}}>+ Add Section</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Section</th><th>Grade Level</th><th>Strand</th><th>Adviser</th><th>Subjects</th><th>Actions</th></tr></thead>
            <tbody>
              {sections.length===0&&<tr><td colSpan={6} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No sections yet.</td></tr>}
              {sections.map(s=>{
                const adv=teachers.find(t=>t.id===s.adviser);
                const secSubs=s.sectionSubjects||[];
                return(
                  <tr key={s.id}>
                    <td><strong>{s.name}</strong></td>
                    <td><span className="tag tag-blue">{s.gradeLevel}</span></td>
                    <td>{s.strand?<span className="tag tag-purple">{s.strand}</span>:<span className="text-muted text-xs">JHS Core</span>}</td>
                    <td>{adv?adv.name:<span className="text-muted text-xs">—</span>}</td>
                    <td>
                      {secSubs.length===0
                        ?<span className="text-muted text-xs">No subjects assigned</span>
                        :<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                          {secSubs.map(ss=>{
                            const sub=subjects.find(x=>x.id===ss.subjectId);
                            return sub?<span key={ss.subjectId} className="tag tag-blue" style={{fontSize:10}}>{sub.name} <span style={{opacity:0.7}}>({ss.units}u)</span></span>:null;
                          })}
                        </div>
                      }
                    </td>
                    <td>
                      <div className="flex gap-8">
                        <button className="btn btn-secondary btn-xs" onClick={()=>{setSubjectToAdd('');setUnitsToAdd(3);setCopyFromId('');setEditing({...s,sectionSubjects:s.sectionSubjects||[]});}}>Edit</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>setConfirm(s)}>Del</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing.id?'Edit Section':'Add Section'}</span>
              <button className="modal-close" onClick={()=>setEditing(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Section Name *</label><input className="form-input" value={editing.name} onChange={e=>setEditing(v=>({...v,name:e.target.value}))} placeholder="e.g. 7-Rizal"/></div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Grade Level</label>
                  <select className="form-select" value={editing.gradeLevel} onChange={e=>setEditing(v=>({...v,gradeLevel:e.target.value,strand:isJHS(e.target.value)?'':v.strand}))}>
                    {GRADE_LEVELS.map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">SHS Strand</label>
                  <select className="form-select" value={editing.strand} onChange={e=>setEditing(v=>({...v,strand:e.target.value}))} disabled={isJHS(editing.gradeLevel)}>
                    <option value="">None (Core)</option>
                    {SHS_STRANDS.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>

              {/* Adviser with duplicate warning */}
              <div className="form-group">
                <label className="form-label">Adviser</label>
                <select className="form-select"
                  value={editing.adviser}
                  onChange={e=>setEditing(v=>({...v,adviser:e.target.value}))}
                  style={editing.adviser&&getAdviserConflict(editing.adviser)?{borderColor:'var(--danger)'}:{}}
                >
                  <option value="">— Select Adviser —</option>
                  {teachers.map(t=>{
                    const conflict=sections.find(s=>s.adviser===t.id&&s.id!==editing.id);
                    return(
                      <option key={t.id} value={t.id}>
                        {t.name}{conflict?' ⚠ (Adviser of '+conflict.name+')':''}
                      </option>
                    );
                  })}
                </select>
                {editing.adviser&&getAdviserConflict(editing.adviser)&&(()=>{
                  const conflict=getAdviserConflict(editing.adviser);
                  const tch=teachers.find(t=>t.id===editing.adviser);
                  return(
                    <div style={{marginTop:6,padding:'8px 12px',background:'rgba(248,81,73,0.12)',border:'1px solid rgba(248,81,73,0.4)',borderRadius:6,fontSize:12,color:'var(--danger)',display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:15}}>⚠️</span>
                      <span><strong>{tch?.name}</strong> is already the adviser of <strong>{conflict.name}</strong>. Please select a different teacher.</span>
                    </div>
                  );
                })()}
              </div>

              {/* Subject Assignment */}
              <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginTop:4}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <div style={{fontFamily:'Syne',fontSize:13,fontWeight:700,color:'var(--text)'}}>📚 Assign Subjects & Units</div>
                  {/* Copy from another section */}
                  {sections.filter(s=>s.id!==editing.id&&(s.sectionSubjects||[]).length>0).length>0&&(
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <select
                        className="form-select"
                        style={{padding:'4px 8px',fontSize:12,width:'auto',minWidth:160}}
                        value={copyFromId}
                        onChange={e=>setCopyFromId(e.target.value)}
                      >
                        <option value="">📋 Copy subjects from...</option>
                        {sections.filter(s=>s.id!==editing.id&&(s.sectionSubjects||[]).length>0).map(s=>(
                          <option key={s.id} value={s.id}>{s.name} ({(s.sectionSubjects||[]).length} subjects)</option>
                        ))}
                      </select>
                      <button
                        className="btn btn-info btn-sm"
                        style={{whiteSpace:'nowrap',fontSize:12}}
                        onClick={()=>copySubjectsFrom(copyFromId)}
                        disabled={!copyFromId}
                      >Copy</button>
                    </div>
                  )}
                </div>

                <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:10}}>
                  <div style={{flex:1}}>
                    <label className="form-label">Subject</label>
                    <select className="form-select" value={subjectToAdd} onChange={e=>setSubjectToAdd(e.target.value)}>
                      <option value="">— Select Subject —</option>
                      {subjects.filter(sub=>!(editing.sectionSubjects||[]).some(x=>x.subjectId===sub.id)).map(sub=>(
                        <option key={sub.id} value={sub.id}>{sub.name}</option>
                      ))}
                    </select>
                  </div>
                  <div style={{width:90}}>
                    <label className="form-label">Units</label>
                    <input type="number" className="form-input" value={unitsToAdd} onChange={e=>setUnitsToAdd(Math.max(1,+e.target.value))} min={1} max={10}/>
                  </div>
                  <button className="btn btn-success" style={{marginBottom:0,whiteSpace:'nowrap'}} onClick={addSubjectToSection}>+ Add</button>
                </div>

                {/* Assigned subjects list */}
                {(editing.sectionSubjects||[]).length===0
                  ?<div style={{textAlign:'center',padding:'14px 0',color:'var(--text3)',fontSize:12,background:'var(--bg3)',borderRadius:6}}>No subjects assigned yet. Add subjects above or copy from another section.</div>
                  :<div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
                    <table style={{width:'100%',borderCollapse:'collapse'}}>
                      <thead><tr style={{background:'var(--bg3)'}}>
                        <th style={{padding:'7px 12px',textAlign:'left',fontSize:11,color:'var(--text2)',fontWeight:700}}>Subject</th>
                        <th style={{padding:'7px 12px',textAlign:'center',fontSize:11,color:'var(--text2)',fontWeight:700,width:100}}>Units</th>
                        <th style={{padding:'7px 12px',textAlign:'center',fontSize:11,color:'var(--text2)',fontWeight:700,width:60}}></th>
                      </tr></thead>
                      <tbody>
                        {(editing.sectionSubjects||[]).map((ss,i)=>{
                          const sub=subjects.find(x=>x.id===ss.subjectId);
                          return(
                            <tr key={ss.subjectId} style={{borderTop:'1px solid var(--border)'}}>
                              <td style={{padding:'8px 12px',fontSize:13}}>{sub?sub.name:<span style={{color:'var(--danger)'}}>Unknown</span>}</td>
                              <td style={{padding:'8px 12px',textAlign:'center'}}>
                                <input type="number" style={{width:60,textAlign:'center',padding:'4px 6px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:13}} value={ss.units} onChange={e=>updateUnits(ss.subjectId,Math.max(1,+e.target.value))} min={1} max={10}/>
                              </td>
                              <td style={{padding:'8px 12px',textAlign:'center'}}>
                                <button className="btn btn-danger btn-xs" onClick={()=>removeSubjectFromSection(ss.subjectId)}>✕</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                }
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditing(null)}>Cancel</button>
              <button
                className="btn btn-primary"
                onClick={save}
                disabled={!!(editing.adviser&&getAdviserConflict(editing.adviser))}
                title={editing.adviser&&getAdviserConflict(editing.adviser)?'Resolve adviser conflict first':'Save section'}
              >Save Section</button>
            </div>
          </div>
        </div>
      )}
      <ConfirmModal open={!!confirm} title="Delete Section" msg={'Delete "'+confirm?.name+'"?'} onConfirm={()=>{setSections(ss=>ss.filter(s=>s.id!==confirm.id));toast('Section deleted','success');setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
    </div>
  );
};

/* ===================== TEACHER PICKER COMPONENT ===================== */
const TeacherPicker=({teachers,selectedId,onSelect,schedules,subjects,sections,editingId,selectedDay,selectedTimeSlot})=>{
  const [popup,setPopup]=useState(null);
  const [popupPos,setPopupPos]=useState({top:0,left:0});
  const selectRef=React.useRef(null);

  const getInfo=(t)=>{
    const mySched=schedules.filter(s=>s.teacherId===t.id&&s.id!==editingId);
    const totalHrs=mySched.reduce((acc,s)=>{
      const p=parseSlotLabel(s.timeSlot);
      return acc+(p?(p.endMin-p.startMin)/60:0);
    },0);
    const maxHrs=t.maxHoursPerWeek||30;
    const byDay={};
    DAYS.forEach(d=>{byDay[d]=[];});
    mySched.forEach(s=>{if(byDay[s.day])byDay[s.day].push(s);});
    DAYS.forEach(d=>byDay[d].sort((a,b)=>{
      const pa=parseSlotLabel(a.timeSlot),pb=parseSlotLabel(b.timeSlot);
      return(pa?.startMin??0)-(pb?.startMin??0);
    }));
    return{mySched,totalHrs,maxHrs,remaining:Math.max(0,maxHrs-totalHrs),byDay};
  };

  const isBusyAt=(t)=>{
    const sp=selectedTimeSlot?parseSlotLabel(selectedTimeSlot):null;
    if(!sp)return false;
    return schedules.some(s=>{
      if(s.teacherId!==t.id||s.day!==selectedDay||s.id===editingId)return false;
      const ep=parseSlotLabel(s.timeSlot);
      return ep&&slotsOverlap(sp.startMin,sp.endMin,ep.startMin,ep.endMin);
    });
  };

  const showPopupForSelected=(id)=>{
    if(!id){setPopup(null);return;}
    const t=teachers.find(x=>x.id===id);
    if(!t){setPopup(null);return;}
    if(selectRef.current){
      const rect=selectRef.current.getBoundingClientRect();
      setPopupPos({top:Math.min(rect.bottom+4,window.innerHeight-440),left:rect.left});
    }
    setPopup(t);
  };

  const selectedTeacher=teachers.find(t=>t.id===selectedId);
  const selectedBusy=selectedTeacher?isBusyAt(selectedTeacher):false;

  return(
    <div style={{position:'relative'}}>
      <select
        ref={selectRef}
        className="form-select"
        value={selectedId}
        style={selectedBusy?{borderColor:'var(--danger)'}:selectedId?{borderColor:'var(--accent3)'}:{}}
        onChange={e=>{onSelect(e.target.value);showPopupForSelected(e.target.value);}}
        onFocus={e=>{if(selectedId)showPopupForSelected(selectedId);}}
        onBlur={()=>setTimeout(()=>setPopup(null),200)}
      >
        <option value="">— Select Teacher —</option>
        {teachers.map(t=>{
          const busy=isBusyAt(t);
          const info=getInfo(t);
          const pct=Math.min(100,Math.round(info.totalHrs/info.maxHrs*100));
          return(
            <option key={t.id} value={t.id}>
              {busy?'⛔':'✅'} {t.name} — {busy?'BUSY at this slot':'FREE'} · {info.totalHrs.toFixed(1)}/{info.maxHrs}h ({pct}%)
            </option>
          );
        })}
      </select>

      {/* Status pill shown below select when a teacher is selected */}
      {selectedTeacher&&(()=>{
        const info=getInfo(selectedTeacher);
        const pct=Math.min(100,Math.round(info.totalHrs/info.maxHrs*100));
        const barClr=pct>=90?'var(--danger)':pct>=60?'var(--accent5)':'var(--accent3)';
        return(
          <div
            style={{marginTop:6,padding:'6px 10px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer'}}
            onMouseEnter={e=>{
              const rect=e.currentTarget.getBoundingClientRect();
              setPopupPos({top:Math.min(rect.bottom+4,window.innerHeight-440),left:rect.left});
              setPopup(selectedTeacher);
            }}
            onMouseLeave={()=>setPopup(null)}
          >
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:12,fontWeight:600,color:selectedBusy?'var(--danger)':'var(--accent3)'}}>
                {selectedBusy?'⛔ BUSY at selected slot':'✅ FREE at selected slot'}
              </span>
              <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{info.totalHrs.toFixed(1)}/{info.maxHrs}h · hover for details</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
              <div style={{flex:1,background:'var(--bg4)',borderRadius:10,height:4,overflow:'hidden'}}>
                <div style={{width:pct+'%',background:barClr,height:'100%',borderRadius:10}}/>
              </div>
              <span style={{fontSize:10,color:barClr,fontWeight:600}}>{pct}%</span>
            </div>
          </div>
        );
      })()}

      {/* Hover popup */}
      {popup&&(()=>{
        const info=getInfo(popup);
        const pct=Math.min(100,Math.round(info.totalHrs/info.maxHrs*100));
        const barClr=pct>=90?'var(--danger)':pct>=60?'var(--accent5)':'var(--accent3)';
        const sp=selectedTimeSlot?parseSlotLabel(selectedTimeSlot):null;
        return(
          <div style={{
            position:'fixed',top:popupPos.top,left:popupPos.left,zIndex:99999,
            background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:10,padding:14,width:300,
            boxShadow:'0 16px 40px rgba(0,0,0,0.7)',pointerEvents:'none'
          }}>
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:13,marginBottom:10,color:'var(--text)',display:'flex',alignItems:'center',gap:8}}>
              <span>👤</span>{popup.name}
            </div>
            <div style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                <span style={{color:'var(--text2)'}}>Teaching Load</span>
                <span style={{color:barClr,fontWeight:700}}>{info.totalHrs.toFixed(1)}/{info.maxHrs}h ({pct}%)</span>
              </div>
              <div style={{background:'var(--bg4)',borderRadius:10,height:6,overflow:'hidden'}}>
                <div style={{width:pct+'%',background:barClr,height:'100%',borderRadius:10}}/>
              </div>
              <div style={{marginTop:4,fontSize:11,color:'var(--accent3)'}}>✓ {info.remaining.toFixed(1)} hrs available</div>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Weekly Schedule</div>
              {info.mySched.length===0
                ?<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No schedules yet — fully available</div>
                :DAYS.filter(d=>(info.byDay[d]||[]).length>0).map(d=>(
                  <div key={d} style={{marginBottom:5}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--accent5)',marginBottom:2}}>{d}</div>
                    {info.byDay[d].map(s=>{
                      const sub=subjects.find(x=>x.id===s.subjectId);
                      const sec=sections.find(x=>x.id===s.sectionId);
                      const ep=parseSlotLabel(s.timeSlot);
                      const clash=sp&&ep&&d===selectedDay&&slotsOverlap(sp.startMin,sp.endMin,ep.startMin,ep.endMin);
                      return(
                        <div key={s.id} style={{
                          display:'flex',justifyContent:'space-between',fontSize:11,
                          padding:'3px 6px',borderRadius:4,marginBottom:2,
                          background:clash?'rgba(248,81,73,0.18)':'var(--bg3)',
                          border:clash?'1px solid rgba(248,81,73,0.4)':'1px solid transparent'
                        }}>
                          <span style={{color:clash?'var(--danger)':'var(--text)',fontWeight:clash?700:400}}>
                            {sub?.name||'?'} <span style={{color:'var(--text3)'}}>({sec?.name||'?'})</span>
                          </span>
                          <span style={{color:'var(--text3)',fontFamily:'monospace',fontSize:10}}>{s.timeSlot}</span>
                        </div>
                      );
                    })}
                  </div>
                ))
              }
            </div>
          </div>
        );
      })()}
    </div>
  );
};

/* ===================== SCHEDULES PAGE ===================== */
const SchedulesPage=({schedules,setSchedules,sections,subjects,teachers,rooms,timeSettings,toast})=>{
  const [filter,setFilter]=useState({section:'',teacher:'',subject:'',grade:'',day:''});
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [clearAllConfirm,setClearAllConfirm]=useState(false);
  const [repeatDays,setRepeatDays]=useState([]);
  const [dragId,setDragId]=useState(null);
  const [dragOverId,setDragOverId]=useState(null);
  const slots=useMemo(()=>generateTimeSlots(timeSettings),[timeSettings]);
  const conflicts=useMemo(()=>detectConflicts(schedules),[schedules]);

  const empty={id:'',sectionId:'',subjectId:'',teacherId:'',roomId:'',day:'Monday',timeSlot:slots[0]?.label||''};

  // Group key: sectionId + subjectId + teacherId
  const groupKey=(s)=>s.sectionId+'|'+s.subjectId+'|'+s.teacherId;

  const filteredSchedules=schedules.filter(s=>{
    if(filter.section&&s.sectionId!==filter.section)return false;
    if(filter.teacher&&s.teacherId!==filter.teacher)return false;
    if(filter.subject&&s.subjectId!==filter.subject)return false;
    if(filter.day&&s.day!==filter.day)return false;
    if(filter.grade){
      const sec=sections.find(x=>x.id===s.sectionId);
      if(!sec||sec.gradeLevel!==filter.grade)return false;
    }
    return true;
  });

  // Sort: by section name → day order → start time
  const DAY_ORDER={Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Saturday:5,Sunday:6};
  const sortedSchedules=useMemo(()=>{
    return [...filteredSchedules].sort((a,b)=>{
      const secA=sections.find(s=>s.id===a.sectionId)?.name||'';
      const secB=sections.find(s=>s.id===b.sectionId)?.name||'';
      if(secA!==secB)return secA.localeCompare(secB);
      const dayDiff=(DAY_ORDER[a.day]??9)-(DAY_ORDER[b.day]??9);
      if(dayDiff!==0)return dayDiff;
      const pa=parseSlotLabel(a.timeSlot);
      const pb=parseSlotLabel(b.timeSlot);
      return(pa?.startMin??0)-(pb?.startMin??0);
    });
  },[filteredSchedules,sections]);

  const getUnfulfilledSubjects=(sectionId)=>{
    const sec=sections.find(s=>s.id===sectionId);
    if(!sec)return subjects;
    return subjects.filter(sub=>{
      if(sub.gradeLevel!==sec.gradeLevel)return false;
      if(sub.strand&&sub.strand!==sec.strand)return false;
      return true;
    });
  };

  const save=()=>{
    if(!editing.sectionId||!editing.subjectId||!editing.teacherId||!editing.roomId||!editing.timeSlot){
      toast('All fields required','error');return;
    }
    const daysToCheck=[editing.day,...repeatDays.filter(d=>d!==editing.day)];
    const conflictMessages=[];
    daysToCheck.forEach(day=>{
      const sp=parseSlotLabel(editing.timeSlot);
      if(!sp)return;
      schedules.forEach(ex=>{
        if(ex.id===editing.id)return;
        if(ex.day!==day)return;
        const ep=parseSlotLabel(ex.timeSlot);
        if(!ep||!slotsOverlap(sp.startMin,sp.endMin,ep.startMin,ep.endMin))return;
        if(ex.teacherId===editing.teacherId){
          const tch=teachers.find(t=>t.id===editing.teacherId);
          const sec=sections.find(s=>s.id===ex.sectionId);
          const sub=subjects.find(s=>s.id===ex.subjectId);
          conflictMessages.push(day+': '+(tch?.name||'Teacher')+' is already teaching '+(sub?.name||'a subject')+' for '+(sec?.name||'another section')+' at '+ex.timeSlot);
        }
        if(ex.roomId===editing.roomId){
          const rm=rooms.find(r=>r.id===editing.roomId);
          const sec=sections.find(s=>s.id===ex.sectionId);
          conflictMessages.push(day+': '+(rm?.name||'Room')+' is already used by '+(sec?.name||'another section')+' at '+ex.timeSlot);
        }
        if(ex.sectionId===editing.sectionId){
          const sec=sections.find(s=>s.id===editing.sectionId);
          conflictMessages.push(day+': '+(sec?.name||'Section')+' already has a class at '+ex.timeSlot);
        }
      });
    });
    if(conflictMessages.length>0){toast('⚠ Conflict: '+conflictMessages[0],'error');return;}

    const newEntries=daysToCheck.map(day=>({...editing,id:uid(),day}));

    if(editing.id){
      // Edit: replace in place
      setSchedules(ss=>[...ss.filter(s=>s.id!==editing.id),...newEntries]);
    }else{
      // New: insert right after last entry with same group key, or at end
      setSchedules(ss=>{
        const deduped=newEntries.filter(ne=>
          !ss.some(ex=>ex.sectionId===ne.sectionId&&ex.day===ne.day&&ex.timeSlot===ne.timeSlot)
        );
        if(deduped.length<newEntries.length){
          const skipped=newEntries.length-deduped.length;
          setTimeout(()=>toast(skipped+' duplicate slot(s) skipped','warn'),0);
        }
        if(deduped.length===0)return ss;
        const key=groupKey(deduped[0]);
        // Find last index of same group key
        let insertIdx=-1;
        for(let i=ss.length-1;i>=0;i--){
          if(groupKey(ss[i])===key){insertIdx=i+1;break;}
        }
        if(insertIdx===-1){
          // No existing group — append
          return[...ss,...deduped];
        }
        const result=[...ss];
        result.splice(insertIdx,0,...deduped);
        return result;
      });
    }
    toast('Schedule saved ('+daysToCheck.length+' day(s))','success');
    setEditing(null);setRepeatDays([]);
  };

  // Drag handlers
  const onDragStart=(e,id)=>{
    setDragId(id);
    e.dataTransfer.effectAllowed='move';
  };
  const onDragOver=(e,id)=>{
    e.preventDefault();
    if(id!==dragId)setDragOverId(id);
  };
  const onDrop=(e,targetId)=>{
    e.preventDefault();
    if(!dragId||dragId===targetId){setDragId(null);setDragOverId(null);return;}
    setSchedules(ss=>{
      const from=ss.findIndex(s=>s.id===dragId);
      const to=ss.findIndex(s=>s.id===targetId);
      if(from===-1||to===-1)return ss;
      const result=[...ss];
      const [moved]=result.splice(from,1);
      result.splice(to,0,moved);
      return result;
    });
    toast('Row moved','success');
    setDragId(null);setDragOverId(null);
  };
  const onDragEnd=()=>{setDragId(null);setDragOverId(null);};

  const subjectColorMap={};
  subjects.forEach((s,i)=>{subjectColorMap[s.id]=i%10;});
  const conflictIds=new Set(conflicts.flatMap(c=>c.ids));

  // Detect group boundaries for visual separator
  const prevKey=(idx)=>idx>0?groupKey(sortedSchedules[idx-1]):'';

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Schedules</h2>
          <p className="text-muted text-sm mt-8">{schedules.length} schedule entries · {conflicts.length} conflict(s)</p>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-danger btn-sm" onClick={()=>setClearAllConfirm(true)}>🗑 Clear All</button>
          <button className="btn btn-primary" onClick={()=>{setEditing({...empty});setRepeatDays([]);}}>+ Add Schedule</button>
        </div>
      </div>

      <div className="filter-bar">
        <select className="filter-select" value={filter.section} onChange={e=>setFilter(f=>({...f,section:e.target.value}))}>
          <option value="">All Sections</option>
          {sections.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="filter-select" value={filter.teacher} onChange={e=>setFilter(f=>({...f,teacher:e.target.value}))}>
          <option value="">All Teachers</option>
          {teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
        <select className="filter-select" value={filter.subject} onChange={e=>setFilter(f=>({...f,subject:e.target.value}))}>
          <option value="">All Subjects</option>
          {subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="filter-select" value={filter.grade} onChange={e=>setFilter(f=>({...f,grade:e.target.value}))}>
          <option value="">All Grades</option>
          {GRADE_LEVELS.map(g=><option key={g}>{g}</option>)}
        </select>
        <select className="filter-select" value={filter.day} onChange={e=>setFilter(f=>({...f,day:e.target.value}))}>
          <option value="">All Days</option>
          {DAYS.map(d=><option key={d}>{d}</option>)}
        </select>
        {Object.values(filter).some(Boolean)&&<button className="btn btn-secondary btn-xs" onClick={()=>setFilter({section:'',teacher:'',subject:'',grade:'',day:''})}>Clear</button>}
      </div>

      {conflicts.length>0&&(
        <div className="conflict-alert">
          <div style={{fontWeight:700,marginBottom:4}}>⚠ {conflicts.length} conflict(s) detected — affected rows are highlighted:</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:12}}>
            {conflicts.filter(c=>c.type==='teacher').length>0&&<span>👤 {conflicts.filter(c=>c.type==='teacher').length} teacher double-booked</span>}
            {conflicts.filter(c=>c.type==='room').length>0&&<span>🏫 {conflicts.filter(c=>c.type==='room').length} room double-booked</span>}
            {conflicts.filter(c=>c.type==='section').length>0&&<span>📚 {conflicts.filter(c=>c.type==='section').length} section overlap</span>}
          </div>
        </div>
      )}

      <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
        <span>⠿</span><span>Drag rows to reorder · Same section+subject+teacher are grouped together</span>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th style={{width:24}}></th><th>Section</th><th>Subject</th><th>Teacher</th><th>Room</th><th>Day</th><th>Time Slot</th><th>Actions</th></tr></thead>
            <tbody>
              {sortedSchedules.length===0&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No schedules found.</td></tr>}
              {sortedSchedules.map((s,idx)=>{
                const sec=sections.find(x=>x.id===s.sectionId);
                const sub=subjects.find(x=>x.id===s.subjectId);
                const tch=teachers.find(x=>x.id===s.teacherId);
                const rm=rooms.find(x=>x.id===s.roomId);
