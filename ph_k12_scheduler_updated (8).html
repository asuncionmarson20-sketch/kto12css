                const hasConflict=conflictIds.has(s.id);
                const myConflicts=conflicts.filter(c=>c.ids.includes(s.id));
                const conflictTypes=[...new Set(myConflicts.map(c=>c.type))];
                const isNewGroup=idx>0&&groupKey(s)!==prevKey(idx);
                const isDragging=dragId===s.id;
                const isDragOver=dragOverId===s.id;
                return(
                  <tr key={s.id}
                    draggable
                    onDragStart={e=>onDragStart(e,s.id)}
                    onDragOver={e=>onDragOver(e,s.id)}
                    onDrop={e=>onDrop(e,s.id)}
                    onDragEnd={onDragEnd}
                    style={{
                      ...(hasConflict?{background:'rgba(248,81,73,0.12)',outline:'1px solid rgba(248,81,73,0.4)'}:{}),
                      ...(isDragging?{opacity:0.4}:{}),
                      ...(isDragOver?{borderTop:'2px solid var(--accent2)'}:{}),
                      ...(isNewGroup?{borderTop:'2px solid var(--border)'}:{}),
                      cursor:'grab',
                    }}
                  >
                    <td style={{textAlign:'center',color:'var(--text3)',fontSize:14,cursor:'grab',userSelect:'none',paddingLeft:8}}>⠿</td>
                    <td>{sec?<span className="tag tag-blue">{sec.name}</span>:'?'}</td>
                    <td>
                      {sub&&<span className={'tag color-'+subjectColorMap[sub.id]} style={{color:'#fff',padding:'2px 8px',borderRadius:20,fontSize:11}}>{sub.name}</span>}
                    </td>
                    <td>{tch?tch.name:<span className="text-muted text-xs">—</span>}</td>
                    <td>{rm?rm.name:<span className="text-muted text-xs">—</span>}</td>
                    <td><span className="tag tag-gray">{s.day}</span></td>
                    <td style={{fontFamily:'monospace',fontSize:12}}>{s.timeSlot}</td>
                    <td>
                      <div className="flex gap-8">
                        {conflictTypes.includes('teacher')&&<span className="tag tag-red" title="Teacher double-booked">👤</span>}
                        {conflictTypes.includes('room')&&<span className="tag tag-red" title="Room double-booked">🏫</span>}
                        {conflictTypes.includes('section')&&<span className="tag tag-red" title="Section overlap">📚</span>}
                        <button className="btn btn-secondary btn-xs" onClick={()=>{setEditing({...s});setRepeatDays([]);}}>Edit</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>setConfirm(s)}>Del</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {editing&&(
        <div className="modal-overlay" onClick={()=>setEditing(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{editing.id?'Edit Schedule':'Add Schedule'}</span>
              <button className="modal-close" onClick={()=>setEditing(null)}>×</button>
            </div>
            <div className="modal-body">
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Section *</label>
                  <select className="form-select" value={editing.sectionId} onChange={e=>setEditing(v=>({...v,sectionId:e.target.value,subjectId:'',teacherId:''}))}>
                    <option value="">— Select Section —</option>
                    {sections.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Subject *</label>
                  <select className="form-select" value={editing.subjectId} onChange={e=>setEditing(v=>({...v,subjectId:e.target.value,teacherId:''}))}>
                    <option value="">— Select Subject —</option>
                    {(()=>{
                      const sec=sections.find(s=>s.id===editing.sectionId);
                      const secSubs=sec&&(sec.sectionSubjects||[]).length>0?sec.sectionSubjects:null;
                      if(secSubs){
                        return secSubs.map(ss=>{
                          const sub=subjects.find(x=>x.id===ss.subjectId);
                          return sub?<option key={sub.id} value={sub.id}>{sub.name} ({ss.units} units)</option>:null;
                        });
                      }
                      return subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>);
                    })()}
                  </select>
                </div>
              </div>
              <div className="grid-2">
                <div className="form-group">
                  <label className="form-label">Teacher *</label>
                  <TeacherPicker
                    teachers={editing.subjectId?teachers.filter(t=>t.subjects.includes(editing.subjectId)):teachers}
                    selectedId={editing.teacherId}
                    onSelect={id=>setEditing(v=>({...v,teacherId:id}))}
                    schedules={schedules}
                    subjects={subjects}
                    sections={sections}
                    editingId={editing.id}
                    selectedDay={editing.day}
                    selectedTimeSlot={editing.timeSlot}
                  />
                </div>
                <div className="form-group"><label className="form-label">Room *</label>
                  <select className="form-select" value={editing.roomId} onChange={e=>setEditing(v=>({...v,roomId:e.target.value}))}>
                    <option value="">— Select Room —</option>
                    {rooms.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">Day *</label>
                  <select className="form-select" value={editing.day} onChange={e=>setEditing(v=>({...v,day:e.target.value}))}>
                    {DAYS.map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Time Slot *</label>
                  <select className="form-select" value={editing.timeSlot} onChange={e=>setEditing(v=>({...v,timeSlot:e.target.value}))}>
                    {slots.map(s=><option key={s.label} value={s.label}>{s.label}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Repeat on other days</label>
                <div className="day-toggle">
                  {DAYS.filter(d=>d!==editing.day).map(d=>{
                    const sec=sections.find(s=>s.id===editing.sectionId);
                    const secSub=sec&&editing.subjectId?(sec.sectionSubjects||[]).find(x=>x.subjectId===editing.subjectId):null;
                    const units=secSub?secSub.units:null;
                    const totalSelected=1+repeatDays.length+(repeatDays.includes(d)?0:1);
                    const wouldExceed=units!==null&&!repeatDays.includes(d)&&totalSelected>units;
                    return(
                      <button key={d}
                        className={'day-btn '+(repeatDays.includes(d)?'active':'')}
                        style={wouldExceed?{borderColor:'var(--danger)',color:'var(--danger)',background:'rgba(248,81,73,0.08)'}:{}}
                        onClick={()=>setRepeatDays(rd=>rd.includes(d)?rd.filter(x=>x!==d):[...rd,d])}
                        title={wouldExceed?'Adding this day will exceed the '+units+'-unit limit for this subject':''}
                      >{d.slice(0,3)}</button>
                    );
                  })}
                </div>
                {(()=>{
                  const totalDays=1+repeatDays.length;
                  const sec=sections.find(s=>s.id===editing.sectionId);
                  const secSub=sec&&editing.subjectId?(sec.sectionSubjects||[]).find(x=>x.subjectId===editing.subjectId):null;
                  const units=secSub?secSub.units:null;
                  const sub=editing.subjectId?subjects.find(x=>x.id===editing.subjectId):null;
                  if(units!==null&&totalDays>units){
                    return(
                      <div style={{marginTop:8,padding:'8px 12px',background:'rgba(248,81,73,0.12)',border:'1px solid rgba(248,81,73,0.4)',borderRadius:6,fontSize:12,color:'var(--danger)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>⚠️</span>
                        <span><strong>Not allowed!</strong> {sub?.name||'Subject'} only has {units} unit{units!==1?'s':''}, but {totalDays} day{totalDays!==1?'s':''} selected. Please remove {totalDays-units} day{totalDays-units!==1?'s':''}.</span>
                      </div>
                    );
                  }
                  if(units!==null&&totalDays===units){
                    return(
                      <div style={{marginTop:8,padding:'8px 12px',background:'rgba(63,185,80,0.1)',border:'1px solid rgba(63,185,80,0.35)',borderRadius:6,fontSize:12,color:'var(--accent3)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>✅</span>
                        <span>Perfect! {totalDays} day{totalDays!==1?'s':''} = {units} unit{units!==1?'s':''}. {[editing.day,...repeatDays].join(', ')}</span>
                      </div>
                    );
                  }
                  if(units!==null&&totalDays<units){
                    return(
                      <div style={{marginTop:8,padding:'8px 12px',background:'rgba(255,166,87,0.1)',border:'1px solid rgba(255,166,87,0.35)',borderRadius:6,fontSize:12,color:'var(--accent5)',display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:16}}>ℹ️</span>
                        <span>{totalDays} day{totalDays!==1?'s':''} selected, {units-totalDays} more needed to complete {units}-unit {sub?.name||'subject'}. {repeatDays.length>0?[editing.day,...repeatDays].join(', '):''}</span>
                      </div>
                    );
                  }
                  if(repeatDays.length>0){
                    return <p className="text-muted text-xs mt-8">Will save {totalDays} entries: {[editing.day,...repeatDays].join(', ')}</p>;
                  }
                  return null;
                })()}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditing(null)}>Cancel</button>
              {(()=>{
                const sec=sections.find(s=>s.id===editing.sectionId);
                const secSub=sec&&editing.subjectId?(sec.sectionSubjects||[]).find(x=>x.subjectId===editing.subjectId):null;
                const units=secSub?secSub.units:null;
                const totalDays=1+repeatDays.length;
                const exceeded=units!==null&&totalDays>units;
                return <button className="btn btn-primary" onClick={save} disabled={exceeded} title={exceeded?'Bawasan muna ang selected days para tumugma sa units':'Save schedule'}>Save</button>;
              })()}
            </div>
          </div>
        </div>
      )}

      <ConfirmModal open={!!confirm} title="Delete Schedule" msg="Delete this schedule entry?" onConfirm={()=>{setSchedules(ss=>ss.filter(s=>s.id!==confirm.id));toast('Deleted','success');setConfirm(null);}} onCancel={()=>setConfirm(null)}/>
      <ConfirmModal
        open={clearAllConfirm}
        title="⚠ Clear All Schedules"
        msg={"This will permanently delete ALL "+schedules.length+" schedule entries. This cannot be undone. Are you sure?"}
        onConfirm={()=>{setSchedules([]);toast('All schedules cleared','success');setClearAllConfirm(false);}}
        onCancel={()=>setClearAllConfirm(false)}
      />
    </div>
  );
};

/* ===================== TIMETABLE PAGE ===================== */
const TimetablePage=({schedules,setSchedules,sections,subjects,teachers,rooms,timeSettings,toast,settings})=>{
  const [viewMode,setViewMode]=useState('section');
  const [selected,setSelected]=useState('');
  const [dragging,setDragging]=useState(null);
  const PX_PER_MIN=1.2;
  const slots=useMemo(()=>generateTimeSlots(timeSettings),[timeSettings]);
  const startMin=timeSettings.startHour*60+timeSettings.startMinute;
  const endMin=timeSettings.endHour*60+timeSettings.endMinute;
  const totalMin=endMin-startMin;
  const columnRefs=useRef(DAYS.reduce((acc,d)=>{acc[d]=React.createRef();return acc;},{}));

  const subjectColorMap={};
  subjects.forEach((s,i)=>{subjectColorMap[s.id]=i%10;});

  const columns=viewMode==='section'?sections:viewMode==='teacher'?teachers:rooms;
  const filterSchedules=(col)=>{
    if(viewMode==='section')return schedules.filter(s=>s.sectionId===col.id);
    if(viewMode==='teacher')return schedules.filter(s=>s.teacherId===col.id);
    return schedules.filter(s=>s.roomId===col.id);
  };

  const getBlockStyle=(s)=>{
    const p=parseSlotLabel(s.timeSlot);
    if(!p)return null;
    const top=(p.startMin-startMin)*PX_PER_MIN;
    const height=Math.max(20,(p.endMin-p.startMin)*PX_PER_MIN);
    return{top,height};
  };

  const breakBlocks=timeSettings.breaks&&timeSettings.breaks.length>0
    ?timeSettings.breaks.filter(b=>b.enabled).map(b=>({
        label:b.label,
        top:(b.startHour*60+b.startMinute-startMin)*PX_PER_MIN,
        height:b.durationMinutes*PX_PER_MIN
      }))
    :timeSettings.lunchEnabled
      ?[{label:'Lunch Break',top:(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute-startMin)*PX_PER_MIN,height:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute))*PX_PER_MIN}]
      :[];

  const onDrop=(e,day,col)=>{
    e.preventDefault();
    if(!dragging)return;
    const rect=columnRefs.current[day]?.current?.getBoundingClientRect();
    if(!rect)return;
    const relY=e.clientY-rect.top;
    const droppedMin=Math.round(relY/PX_PER_MIN/5)*5+startMin;
    const p=parseSlotLabel(dragging.timeSlot);
    if(!p)return;
    const dur=p.endMin-p.startMin;
    const newStart=Math.max(startMin,Math.min(endMin-dur,droppedMin));
    const newEnd=newStart+dur;
    const newSlot=fmtTime(newStart)+' - '+fmtTime(newEnd);
    for(const s of schedules){
      if(s.id===dragging.id)continue;
      if(s.day!==day)continue;
      const sp=parseSlotLabel(s.timeSlot);
      if(!sp)continue;
      if(!slotsOverlap(newStart,newEnd,sp.startMin,sp.endMin))continue;
      if(s.teacherId===dragging.teacherId){toast('Teacher conflict!','error');setDragging(null);return;}
      if(s.sectionId===dragging.sectionId){toast('Section conflict!','error');setDragging(null);return;}
    }
    setSchedules(ss=>ss.map(s=>s.id===dragging.id?{...s,day,timeSlot:newSlot}:s));
    toast('Schedule moved','success');
    setDragging(null);
  };

  const selected_col=selected?columns.find(c=>c.id===selected):null;
  const displayColumns=selected_col?[selected_col]:columns;

  return(
    <div className="page-content" style={{padding:0}}>
      <div style={{padding:'16px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Visual Timetable</h2>
          <p className="text-muted text-sm mt-8">Drag blocks to reschedule · Click × to remove</p>
        </div>
        <div className="flex gap-8" style={{alignItems:'center'}}>
          <div className="flex" style={{background:'var(--bg3)',borderRadius:'var(--radius)',border:'1px solid var(--border)',overflow:'hidden'}}>
            {['section','teacher','room'].map(m=>(
              <button key={m} className="btn" style={{borderRadius:0,border:'none',background:viewMode===m?'var(--accent)':'transparent',color:viewMode===m?'#fff':'var(--text2)',padding:'5px 12px',fontSize:12,textTransform:'capitalize'}} onClick={()=>{setViewMode(m);setSelected('');}}>{m==='section'?'🎒':m==='teacher'?'👩‍🏫':'🏫'} {m}</button>
            ))}
          </div>
          <select className="filter-select" value={selected} onChange={e=>setSelected(e.target.value)}>
            <option value="">All</option>
            {columns.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <button className="btn btn-secondary" style={{fontSize:12,whiteSpace:'nowrap'}} onClick={()=>{
            const col=selected_col;
            const title=col?col.name:'All';
            const colList=col?[col]:columns;
            const COLORS=['#e8f4fd','#fef9e7','#eafaf1','#fdf2f8','#fff3e0','#f3e5f5','#e0f7fa','#fce4ec','#f9fbe7','#ede7f6'];
            const bkCss='background:#fffde7;border:1px solid #f0c040;border-radius:3px;padding:2px 6px;color:#7a4f00;font-size:9pt;font-weight:600;text-align:center';
            const activeBreaks=(timeSettings.breaks&&timeSettings.breaks.length>0)?timeSettings.breaks.filter(b=>b.enabled):timeSettings.lunchEnabled?[{label:'Lunch Break',startHour:timeSettings.lunchStartHour,startMinute:timeSettings.lunchStartMinute,durationMinutes:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute)-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute)}]:[];
            const teachSlots=generateTimeSlots(timeSettings);
            // Build timeline rows: all slots + all enabled breaks, sorted by start time
            const timelineRows=[];
            teachSlots.forEach(sl=>timelineRows.push({type:'slot',label:sl.label,startMin:sl.startMin,endMin:sl.endMin}));
            activeBreaks.forEach(b=>{
              const bs=b.startHour*60+b.startMinute;
              timelineRows.push({type:'break',label:b.label,duration:b.durationMinutes,startMin:bs,timeStr:fmtTime(bs)+' - '+fmtTime(bs+b.durationMinutes)});
            });
            timelineRows.sort((a,b)=>(a.startMin)-(b.startMin));
            const subColorMap={};subjects.forEach((s,i)=>{subColorMap[s.id]=i%10;});
            const header='<div style="font-family:Arial,sans-serif;padding:20mm;min-height:297mm;background:#fff;color:#000">'
              +'<div style="text-align:center;margin-bottom:14px">'
              +'<div style="font-size:8pt;color:#555">Republic of the Philippines · Department of Education</div>'
              +'<div style="font-size:14pt;font-weight:700;text-transform:uppercase">'+(settings?settings.schoolName:'School')+'</div>'
              +'<div style="font-size:8pt;color:#555">'+(settings?settings.address:'')+'</div>'
              +'<div style="background:#111;color:#fff;padding:5px 0;font-size:11pt;font-weight:700;letter-spacing:1px;margin:8px 0 4px;text-transform:uppercase">VISUAL TIMETABLE — '+title.toUpperCase()+'</div>'
              +'<div style="font-size:8pt">S.Y. '+(settings?settings.schoolYear:'')+' · '+(settings?settings.semester:'')+'</div>'
              +'</div>';
            const thStyle='background:#333;color:#fff;padding:5px 4px;border:1px solid #555;font-size:7.5pt;text-align:center;white-space:nowrap';
            const thBreakStyle='background:#7a4f00;color:#ffe082;padding:5px 4px;border:1px solid #555;font-size:7.5pt;text-align:center;white-space:nowrap';
            const tableHdr='<table style="width:100%;border-collapse:collapse;font-size:8pt"><thead><tr>'
              +'<th style="'+thStyle+';min-width:90px">'+viewMode.toUpperCase()+'</th>'
              +timelineRows.map(r=>r.type==='break'
                ?'<th style="'+thBreakStyle+'">'+r.label+'<br><span style="font-size:6pt">'+r.timeStr+'</span></th>'
                :'<th style="'+thStyle+'">'+r.label+'</th>'
              ).join('')
              +'</tr></thead><tbody>';
            const tableRows=colList.map(col=>{
              const colScheds=viewMode==='section'?schedules.filter(s=>s.sectionId===col.id):viewMode==='teacher'?schedules.filter(s=>s.teacherId===col.id):schedules.filter(s=>s.roomId===col.id);
              const groupedByDay={};
              DAYS.forEach(d=>{groupedByDay[d]=colScheds.filter(s=>s.day===d);});
              return DAYS.map((day,di)=>{
                const cells=timelineRows.map(r=>{
                  if(r.type==='break')return'<td style="'+bkCss+';border:1px solid #f0c040">☕</td>';
                  const entry=groupedByDay[day].find(s=>s.timeSlot===r.label);
                  if(!entry)return'<td style="border:1px solid #ddd;background:#fafafa;text-align:center;color:#bbb;font-size:7pt">—</td>';
                  const sub=subjects.find(x=>x.id===entry.subjectId);
                  const tch=teachers.find(x=>x.id===entry.teacherId);
                  const rm=rooms.find(x=>x.id===entry.roomId);
                  const bg=COLORS[subColorMap[entry.subjectId]||0];
                  return'<td style="border:1px solid #ccc;background:'+bg+';padding:3px 4px;text-align:center;vertical-align:middle;font-size:7.5pt">'
                    +'<div style="font-weight:700;color:#111">'+(sub?.name||'?')+'</div>'
                    +(viewMode!=='teacher'?'<div style="color:#555;font-size:7pt">'+(tch?.name||'')+'</div>':'')
                    +(viewMode!=='room'?'<div style="color:#777;font-size:6.5pt;font-style:italic">'+(rm?.name||'')+'</div>':'')
                    +'</td>';
                }).join('');
                const isFirst=di===0;
                const rowLabel=isFirst?'<td rowspan="5" style="border:1px solid #ccc;background:#f0f0f0;font-weight:700;font-size:9pt;text-align:center;vertical-align:middle;writing-mode:vertical-lr;transform:rotate(180deg);padding:4px 2px">'+col.name+'</td>':'';
                return'<tr>'+(isFirst?rowLabel:'')+'<td style="border:1px solid #ccc;background:#f5f5f5;font-weight:600;font-size:7.5pt;padding:2px 5px;white-space:nowrap">'+day+'</td>'+cells+'</tr>';
              }).join('');
            }).join('');
            const html=header+tableHdr+tableRows+'</tbody></table></div>';
            const w=window.open('','_blank','width=1100,height=800');
            w.document.write('<!DOCTYPE html><html><head><title>Timetable Print</title><style>@media print{body{margin:0}}</style></head><body>'+html+'</body></html>');
            w.document.close();
            setTimeout(()=>w.print(),400);
          }}>🖨 Print Timetable</button>
        </div>
      </div>

      <div className="timetable-wrap" style={{margin:'12px 0 0',padding:'0 0 20px'}}>
        <div style={{display:'grid',gridTemplateColumns:'60px repeat('+DAYS.length+', 1fr)',minWidth:700}}>
          <div className="tt-header" style={{gridColumn:'1',position:'sticky',left:0,zIndex:20,background:'var(--bg3)'}}></div>
          {DAYS.map(d=><div key={d} className="tt-header">{d}</div>)}

          {displayColumns.map(col=>{
            const colScheds=filterSchedules(col);
            return(
              <React.Fragment key={col.id}>
                <div style={{gridColumn:'1',background:'var(--bg2)',borderRight:'1px solid var(--border)',borderBottom:'1px solid var(--border)',padding:'6px 4px',position:'sticky',left:0,zIndex:5,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <div style={{writingMode:'vertical-rl',textOrientation:'mixed',transform:'rotate(180deg)',fontSize:11,fontWeight:700,color:'var(--text2)',whiteSpace:'nowrap'}}>{col.name}</div>
                </div>
                {DAYS.map(day=>{
                  const dayScheds=colScheds.filter(s=>s.day===day);
                  return(
                    <div key={day} ref={columnRefs.current[day]} className="tt-cell" style={{height:totalMin*PX_PER_MIN,position:'relative'}}
                      onDragOver={e=>e.preventDefault()}
                      onDrop={e=>onDrop(e,day,col)}
                    >
                      {Array.from({length:Math.ceil(totalMin/60)+1},(_,i)=>{
                        const y=i*60*PX_PER_MIN;
                        if(y>totalMin*PX_PER_MIN)return null;
                        return<div key={i} style={{position:'absolute',top:y,left:0,right:0,borderTop:'1px solid rgba(48,54,61,0.5)',pointerEvents:'none',zIndex:1}}></div>;
                      })}
                      {breakBlocks.map((bl,bi)=>(
                        <div key={bi} className="tt-lunch-block" style={{top:bl.top,height:bl.height}}>
                          <span className="tt-lunch-label">{bl.label.toUpperCase()}</span>
                        </div>
                      ))}
                      {dayScheds.map(s=>{
                        const style=getBlockStyle(s);
                        if(!style)return null;
                        const sub=subjects.find(x=>x.id===s.subjectId);
                        const tch=teachers.find(x=>x.id===s.teacherId);
                        const rm=rooms.find(x=>x.id===s.roomId);
                        const colorIdx=subjectColorMap[s.subjectId]||0;
                        return(
                          <div key={s.id} className={'tt-block color-'+colorIdx} style={{top:style.top,height:style.height,zIndex:3}} draggable
                            onDragStart={()=>setDragging(s)}
                            onDragEnd={()=>setDragging(null)}
                          >
                            <div className="tt-block-title">{sub?.name||'?'}</div>
                            {style.height>28&&<div className="tt-block-sub">{tch?.name||''}</div>}
                            {style.height>42&&<div className="tt-block-sub">{rm?.name||''}</div>}
                            <button className="tt-block-remove" onClick={()=>setSchedules(ss=>ss.filter(x=>x.id!==s.id))}>×</button>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ===================== AI SCHEDULER PAGE ===================== */
const AISchedulerPage=({schedules,setSchedules,sections,subjects,teachers,rooms,timeSettings,toast})=>{
  const [targetIds,setTargetIds]=useState([]);
  const [clearExisting,setClearExisting]=useState(false);
  const [running,setRunning]=useState(false);
  const [log,setLog]=useState([]);
  const [result,setResult]=useState(null);
  const logRef=useRef();

  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[log]);

  const toggleTarget=(id)=>setTargetIds(ts=>ts.includes(id)?ts.filter(x=>x!==id):[...ts,id]);

  const run=()=>{
    setRunning(true);setLog([]);setResult(null);
    setTimeout(()=>{
      const res=runAIScheduler(sections,subjects,teachers,rooms,clearExisting?[]:schedules,timeSettings,targetIds);
      setLog(res.log);setResult(res);
      setSchedules(res.schedules);
      toast('AI Scheduler done: '+res.placed+' placed, '+res.skipped+' skipped','success');
      setRunning(false);
    },100);
  };

  return(
    <div className="page-content">
      <div className="mb-16">
        <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>🤖 AI Scheduler</h2>
        <p className="text-muted text-sm mt-8">Automatically generates schedules based on your constraints</p>
      </div>

      <div className="grid-2" style={{gap:16,marginBottom:16}}>
        <div className="card">
          <div className="card-header"><span className="card-title">Target Sections</span></div>
          <p className="text-muted text-xs mb-8">Leave all unchecked to schedule ALL sections.</p>
          <div className="check-list">
            {sections.map(sec=>(
              <label key={sec.id} className="check-item" style={{cursor:'pointer'}}>
                <input type="checkbox" checked={targetIds.includes(sec.id)} onChange={()=>toggleTarget(sec.id)}/>
                <span>{sec.name}</span>
                <span className="tag tag-blue" style={{marginLeft:'auto'}}>{sec.gradeLevel}</span>
              </label>
            ))}
            {sections.length===0&&<p className="text-muted text-xs">No sections available.</p>}
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Options</span></div>
          <label className="check-item" style={{cursor:'pointer',marginBottom:12}}>
            <input type="checkbox" checked={clearExisting} onChange={e=>setClearExisting(e.target.checked)}/>
            <div>
              <div style={{fontWeight:600}}>Clear existing schedules before running</div>
              <div className="text-muted text-xs">Removes all current entries for targeted sections</div>
            </div>
          </label>
          <div style={{padding:'10px',background:'rgba(247,129,102,0.08)',border:'1px solid rgba(247,129,102,0.2)',borderRadius:'var(--radius)',fontSize:12,color:'var(--text2)',marginBottom:12}}>
            ⚡ AI will load-balance teachers, prefer labs for Science/CS, respect max hours/day limits, and skip lunch break.
          </div>
          <button className="btn btn-primary" style={{width:'100%'}} onClick={run} disabled={running}>
            {running?'⏳ Running...':'🚀 Run AI Scheduler'}
          </button>
          {result&&(
            <div style={{marginTop:12,display:'flex',gap:8}}>
              <div style={{flex:1,background:'rgba(63,185,80,0.1)',border:'1px solid rgba(63,185,80,0.3)',borderRadius:'var(--radius)',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--accent3)'}}>{result.placed}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>Placed</div>
              </div>
              <div style={{flex:1,background:'rgba(255,166,87,0.1)',border:'1px solid rgba(255,166,87,0.3)',borderRadius:'var(--radius)',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--accent5)'}}>{result.skipped}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>Skipped</div>
              </div>
              <div style={{flex:1,background:'rgba(248,81,73,0.1)',border:'1px solid rgba(248,81,73,0.3)',borderRadius:'var(--radius)',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--danger)'}}>{result.conflicts?.length||0}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>Conflicts</div>
              </div>
            </div>
          )}
        </div>
      </div>

      {log.length>0&&(
        <div className="card">
          <div className="card-header"><span className="card-title">Execution Log</span></div>
          <div className="ai-log" ref={logRef}>
            {log.map((l,i)=>(
              <div key={i} className={'log-'+l.type}>{l.msg}</div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

/* ===================== PRINT PREVIEW MODAL ===================== */
const PrintPreviewModal=({open,onClose,content,title})=>{
  if(!open)return null;
  const doPrint=()=>{
    const w=window.open('','_blank');
    const printHtml='<html><head><title>'+title+'</title><style>'
      +'*{box-sizing:border-box;margin:0;padding:0}'
      +'@page{size:A4 landscape;margin:8mm 10mm}'
      +'body{background:#fff;font-family:Arial,sans-serif;font-size:9pt}'
      +'@media print{body{margin:0}thead{display:table-header-group}tr{page-break-inside:avoid}}'
      +'</style></head><body>'+content+'</body></html>';
    w.document.write(printHtml);
    w.document.close();
    w.focus();
    setTimeout(()=>{w.print();},300);
  };
  return(
    <div className="print-preview-overlay">
      <div className="print-preview-header">
        <div style={{fontFamily:'Syne',fontSize:15,fontWeight:700}}>🖨 Print Preview: {title}</div>
        <div className="flex gap-8">
          <button className="btn btn-primary btn-sm" onClick={doPrint}>🖨 Print (Landscape)</button>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕ Close</button>
        </div>
      </div>
      <div className="print-preview-body">
        <div dangerouslySetInnerHTML={{__html:content}} style={{background:'#fff',width:'100%',maxWidth:1100,margin:'0 auto',boxShadow:'0 0 40px rgba(0,0,0,0.5)'}}/>
      </div>
    </div>
  );
};

/* ===================== REPORTS PAGE ===================== */
const ReportsPage=({schedules,sections,subjects,teachers,rooms,settings,signatories,timeSettings,toast})=>{
  const [reportType,setReportType]=useState('section');
  const [selectedId,setSelectedId]=useState('');
  const [printOpen,setPrintOpen]=useState(false);
  const [printContent,setPrintContent]=useState('');
  const [printTitle,setPrintTitle]=useState('');

  const subjectColorMap={};
  subjects.forEach((s,i)=>{subjectColorMap[s.id]=i%10;});

  const renderLogoHtml=(imgData,fallbackText,align)=>{
    if(imgData){return '<img src="'+imgData+'" style="width:60px;height:60px;object-fit:contain;display:block;">';}
    return '<div style="font-size:36px;width:60px;text-align:center;line-height:60px">'+fallbackText+'</div>';
  };

  const buildHeader=(title)=>{
    const leftLogo=renderLogoHtml(settings.logoLeftImg,settings.logoLeft||'🏫','left');
    const rightLogo=renderLogoHtml(settings.logoRightImg,settings.logoRight||'🇵🇭','right');
    return '<div style="padding:5mm 8mm 3mm;font-family:Arial,sans-serif;font-size:9pt;background:#fff;color:#000;width:100%">'
      +'<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px">'
      +'<div style="flex-shrink:0;display:flex;align-items:center">'+leftLogo+'</div>'
      +'<div style="text-align:center;">'
      +'<div style="font-size:7pt;color:#555">Republic of the Philippines &nbsp;|&nbsp; Department of Education</div>'
      +'<div style="font-size:13pt;font-weight:700;text-transform:uppercase;line-height:1.2">'+settings.schoolName+'</div>'
      +'<div style="font-size:7.5pt;color:#555">'+settings.address+'</div>'
      +'<div style="font-size:7.5pt;color:#555;margin-top:1px">'+settings.semester+'</div>'
      +'</div>'
      +'<div style="flex-shrink:0;display:flex;align-items:center">'+rightLogo+'</div>'
      +'</div>'
      +'<div style="background:#1a1a2e;color:#fff;text-align:center;padding:4px 8px;font-size:11pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:4px 0 3px">'+title+'</div>'
      +'<div style="display:flex;gap:8px;justify-content:center;margin-bottom:5px">'
      +'<span style="padding:2px 10px;font-size:8pt;font-weight:600">S.Y. '+settings.schoolYear+'</span>'
      +'</div>';
  };

  const buildFooter=(signatories)=>{
    const sigHtml=[...signatories].sort((a,b)=>a.order-b.order).map(s=>(
      '<div style="text-align:left;min-width:140px">'
      +(s.title?'<div style="font-size:8pt;color:#666;margin-bottom:4px;text-align:left">'+s.title+'</div>':'')
      +'<div style="border-top:1.5px solid #333;padding-top:5px;margin-top:25px;font-weight:700;font-size:9.5pt;text-align:left">'+s.name+'</div>'
      +'<div style="font-size:8.5pt;color:#444;text-align:left">'+s.position+'</div>'
      +'</div>'
    )).join('');
    return '<div style="display:flex;justify-content:space-around;margin-top:20px;padding:0 8mm">'+sigHtml+'</div></div>';
  };

  const buildSectionReport=(secId)=>{
    const sec=sections.find(s=>s.id===secId);
    if(!sec)return'';
    const secSchedules=schedules.filter(s=>s.sectionId===secId);
    if(secSchedules.length===0)return buildHeader('Class Program — '+sec.name)+'<p style="color:#666;text-align:center;padding:20px">No schedules found for this section.</p>'+buildFooter(signatories);
    const activeBreaks=(timeSettings.breaks&&timeSettings.breaks.length>0)
      ?timeSettings.breaks.filter(b=>b.enabled)
      :timeSettings.lunchEnabled?[{label:'Lunch Break',startHour:timeSettings.lunchStartHour,startMinute:timeSettings.lunchStartMinute,durationMinutes:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute)-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute)}]:[];
    // Build timeline: all class slots used by this section + ALL enabled breaks (always shown)
    const allDaySlots=generateTimeSlots(timeSettings);
    const usedSlotLabels=new Set(secSchedules.map(s=>s.timeSlot));
    const relevantSlots=allDaySlots.filter(sl=>usedSlotLabels.has(sl.label));
    const timelineCols=[];
    relevantSlots.forEach(sl=>timelineCols.push({type:'slot',label:sl.label,startMin:sl.startMin,endMin:sl.endMin}));
    // Always add ALL enabled breaks — no range filtering, breaks always belong in the schedule
    activeBreaks.forEach(b=>{
      const bs=b.startHour*60+b.startMinute;
      const be=bs+b.durationMinutes;
      timelineCols.push({type:'break',label:b.label,duration:b.durationMinutes,breakStart:bs,
        timeStr:fmtTime(bs)+' – '+fmtTime(be)});
    });
    timelineCols.sort((a,b)=>(a.startMin!==undefined?a.startMin:a.breakStart)-(b.startMin!==undefined?b.startMin:b.breakStart));
    const thDay='background:#1a1a2e;color:#fff;padding:5px 8px;border:1px solid #333;text-align:center;font-size:8pt;font-weight:700;white-space:nowrap;width:60px';
    const thSlot='background:#2d3561;color:#fff;padding:4px 5px;border:1px solid #333;text-align:center;font-size:7pt;white-space:normal;word-break:break-word';
    const thBreak='background:#5a3a00;color:#ffe082;padding:4px 5px;border:1px solid #333;text-align:center;font-size:7pt;white-space:normal;word-break:break-word';
    const tdDay='padding:5px 6px;border:1px solid #ccc;font-weight:700;font-size:8pt;background:#f0f0f0;white-space:nowrap;vertical-align:middle;text-align:center;width:60px';
    const tdFree='padding:4px 4px;border:1px solid #e8e8e8;text-align:center;background:#fafafa;color:#bbb;font-size:7pt';
    const tdBreak='padding:4px 5px;border:1px solid #e8c400;text-align:center;background:#fffbe6;color:#7a4f00;font-size:7pt;font-weight:700;white-space:normal;word-break:break-word;vertical-align:middle';
    const tdClass='padding:3px 5px;border:1px solid #ccc;text-align:center;vertical-align:middle;font-size:7.5pt;background:#fff';
    const header='<tr>'
      +'<th style="'+thDay+'">DAY</th>'
      +timelineCols.map(col=>col.type==='break'
        ?'<th style="'+thBreak+'">'+col.label+'<br/><span style="font-size:6pt;font-weight:400;opacity:0.85">'+col.timeStr+'</span></th>'
        :'<th style="'+thSlot+'">'+col.label+'</th>'
      ).join('')+'</tr>';
    const rows=DAYS.map(day=>{
      const cells=timelineCols.map(col=>{
        if(col.type==='break') return'<td style="'+tdBreak+'">⏸ '+col.label+'<br/><span style="font-size:6pt;font-weight:400">'+(col.duration)+'min</span></td>';
        const entry=secSchedules.find(s=>s.day===day&&s.timeSlot===col.label);
        if(!entry)return'<td style="'+tdFree+'">—</td>';
        const sub=subjects.find(x=>x.id===entry.subjectId);
        const tch=teachers.find(x=>x.id===entry.teacherId);
        const rm=rooms.find(x=>x.id===entry.roomId);
        return'<td style="'+tdClass+'">'
          +'<div style="font-weight:700;color:#111;font-size:8.5pt">'+(sub?.name||'?')+'</div>'
          +'<div style="color:#444;font-size:7.5pt;margin-top:2px">'+(tch?.name||'')+'</div>'
          +'<div style="color:#888;font-size:7pt;font-style:italic">'+(rm?.name||'')+'</div>'
          +'</td>';
      }).join('');
      return'<tr><td style="'+tdDay+'">'+day+'</td>'+cells+'</tr>';
    }).join('');
    const adviser=teachers.find(t=>t.id===sec.adviser);
    return buildHeader('Class Program — '+sec.name+' ('+sec.gradeLevel+(sec.strand?' · '+sec.strand:'')+')')
      +(adviser?'<p style="margin-bottom:8px;font-size:10pt">Adviser: <strong>'+adviser.name+'</strong></p>':'')
      +'<div style="overflow-x:auto">'
      +'<table style="width:100%;border-collapse:collapse;table-layout:auto;font-size:7.5pt">'
      +'<thead>'+header+'</thead>'
      +'<tbody>'+rows+'</tbody>'
      +'</table>'
      +'</div>'
      +buildFooter(signatories);
  };

  const buildTeacherReport=(tchId)=>{
    const tch=teachers.find(t=>t.id===tchId);
    if(!tch)return'';
    const tchSchedules=schedules.filter(s=>s.teacherId===tchId);
    const teachingHrsT=tchSchedules.reduce((acc,s)=>{const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);},0);
    const respHrsT=(tch.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
    const totalHrs=teachingHrsT+respHrsT;
    if(tchSchedules.length===0)return buildHeader('Teacher Weekly Schedule — '+tch.name)+'<p style="color:#666;text-align:center;padding:20px">No schedules found for this teacher.</p>'+buildFooter(signatories);
    const activeBreaks=(timeSettings.breaks&&timeSettings.breaks.length>0)
      ?timeSettings.breaks.filter(b=>b.enabled)
      :timeSettings.lunchEnabled?[{label:'Lunch Break',startHour:timeSettings.lunchStartHour,startMinute:timeSettings.lunchStartMinute,durationMinutes:(timeSettings.lunchEndHour*60+timeSettings.lunchEndMinute)-(timeSettings.lunchStartHour*60+timeSettings.lunchStartMinute)}]:[];
    const allDaySlotsT=generateTimeSlots(timeSettings);
    const usedSlotLabelsT=new Set(tchSchedules.map(s=>s.timeSlot));
    const relevantSlotsT=allDaySlotsT.filter(sl=>usedSlotLabelsT.has(sl.label));
    const timelineCols=[];
    relevantSlotsT.forEach(sl=>timelineCols.push({type:'slot',label:sl.label,startMin:sl.startMin,endMin:sl.endMin}));
    // Always add ALL enabled breaks — no range filtering
    activeBreaks.forEach(b=>{
      const bs=b.startHour*60+b.startMinute;
      const be=bs+b.durationMinutes;
      timelineCols.push({type:'break',label:b.label,duration:b.durationMinutes,breakStart:bs,
        timeStr:fmtTime(bs)+' – '+fmtTime(be)});
    });
    timelineCols.sort((a,b)=>(a.startMin!==undefined?a.startMin:a.breakStart)-(b.startMin!==undefined?b.startMin:b.breakStart));
    const thDay='background:#1a2e1a;color:#fff;padding:5px 8px;border:1px solid #333;text-align:center;font-size:8pt;font-weight:700;white-space:nowrap;width:60px';
    const thSlot='background:#2d5e2d;color:#fff;padding:4px 5px;border:1px solid #333;text-align:center;font-size:7pt;white-space:normal;word-break:break-word';
    const thBreak='background:#5a3a00;color:#ffe082;padding:4px 5px;border:1px solid #333;text-align:center;font-size:7pt;white-space:normal;word-break:break-word';
    const tdDay='padding:5px 6px;border:1px solid #ccc;font-weight:700;font-size:8pt;background:#e8f5e9;white-space:nowrap;vertical-align:middle;text-align:center;width:60px';
    const tdFree='padding:4px 4px;border:1px solid #e8e8e8;text-align:center;background:#fafafa;color:#bbb;font-size:7pt';
    const tdBreak='padding:4px 5px;border:1px solid #e8c400;text-align:center;background:#fffbe6;color:#7a4f00;font-size:7pt;font-weight:700;white-space:normal;word-break:break-word;vertical-align:middle';
    const tdClass='padding:3px 5px;border:1px solid #ccc;text-align:center;vertical-align:middle;font-size:7.5pt;background:#fff';
    const header='<tr><th style="'+thDay+'">DAY</th>'
      +timelineCols.map(col=>col.type==='break'
        ?'<th style="'+thBreak+'">'+col.label+'<br/><span style="font-size:6pt;font-weight:400;opacity:0.85">'+col.timeStr+'</span></th>'
        :'<th style="'+thSlot+'">'+col.label+'</th>'
      ).join('')+'</tr>';
    const rows=DAYS.map(day=>{
      const cells=timelineCols.map(col=>{
        if(col.type==='break')return'<td style="'+tdBreak+'">⏸ '+col.label+'<br/><span style="font-size:6pt;font-weight:400">'+(col.duration)+'min</span></td>';
        const entry=tchSchedules.find(s=>s.day===day&&s.timeSlot===col.label);
        if(!entry)return'<td style="'+tdFree+'">—</td>';
        const sub=subjects.find(x=>x.id===entry.subjectId);
        const sec=sections.find(x=>x.id===entry.sectionId);
        const rm=rooms.find(x=>x.id===entry.roomId);
        return'<td style="'+tdClass+'">'
          +'<div style="font-weight:700;color:#111;font-size:8.5pt">'+(sub?.name||'?')+'</div>'
          +'<div style="color:#444;font-size:7.5pt;margin-top:2px">'+(sec?.name||'')+'</div>'
          +'<div style="color:#888;font-size:7pt;font-style:italic">'+(rm?.name||'')+'</div>'
          +'</td>';
      }).join('');
      return'<tr><td style="'+tdDay+'">'+day+'</td>'+cells+'</tr>';
    }).join('');
    const pct=Math.round(totalHrs/(tch.maxHoursPerWeek||30)*100);
    const overloaded=totalHrs>(tch.maxHoursPerWeek||30);
    return buildHeader('Teacher Weekly Schedule — '+tch.name)
      +'<div style="display:flex;gap:16px;margin-bottom:10px;align-items:center">'
      +'<p style="font-size:10pt;margin:0">Teaching Load: <strong>'+totalHrs.toFixed(1)+'h</strong> / '+tch.maxHoursPerWeek+'h'
      +(overloaded?' <span style="color:#c00;font-weight:700"> ⚠ OVERLOADED</span>':'')+'</p>'
      +'<div style="flex:1;background:#eee;border-radius:4px;height:10px;max-width:200px"><div style="height:10px;border-radius:4px;background:'+(overloaded?'#c00':'#2a7a2a')+';width:'+Math.min(100,pct)+'%"></div></div>'
      +'<span style="font-size:9pt;font-weight:700;color:'+(overloaded?'#c00':'#2a7a2a')+'">'+pct+'%</span>'
      +'</div>'
      +'<div style="overflow-x:auto">'
      +'<table style="width:100%;border-collapse:collapse;table-layout:auto;font-size:7.5pt">'
      +'<thead>'+header+'</thead>'
      +'<tbody>'+rows+'</tbody>'
      +'</table>'
      +'</div>'
      +buildFooter(signatories);
  };

  const buildLoadReport=()=>{
    const rows=teachers.map(t=>{
      const tchS=schedules.filter(s=>s.teacherId===t.id);
      const teachHrs=tchS.reduce((acc,s)=>{const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);},0);
      const rHrs=(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
      const hrs=teachHrs+rHrs;
      const pct=Math.min(100,Math.round(hrs/t.maxHoursPerWeek*100));
      const subjNames=[...new Set(tchS.map(s=>subjects.find(x=>x.id===s.subjectId)?.name).filter(Boolean))].join(', ');
      return '<tr><td style="padding:5px 8px;border:1px solid #ccc;font-weight:700">'+t.name+'</td><td style="padding:5px 8px;border:1px solid #ccc">'+tchS.length+'</td><td style="padding:5px 8px;border:1px solid #ccc">'+hrs.toFixed(1)+'h / '+t.maxHoursPerWeek+'h</td><td style="padding:5px 8px;border:1px solid #ccc">'+pct+'%</td><td style="padding:5px 8px;border:1px solid #ccc;font-size:9pt">'+subjNames+'</td></tr>';
    }).join('');
    return buildHeader('Teacher Load Report')+'<table style="width:100%;border-collapse:collapse;font-size:9pt"><thead><tr><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Teacher</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Classes</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Hours</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Load %</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Subjects</th></tr></thead><tbody>'+rows+'</tbody></table>'+buildFooter(signatories);
  };

  const buildRoomReport=()=>{
    const rows=rooms.map(r=>{
      const rmS=schedules.filter(s=>s.roomId===r.id);
      const dayUsage=DAYS.map(d=>rmS.filter(s=>s.day===d).length).join(' / ');
      return '<tr><td style="padding:5px 8px;border:1px solid #ccc;font-weight:700">'+r.name+'</td><td style="padding:5px 8px;border:1px solid #ccc">'+r.type+'</td><td style="padding:5px 8px;border:1px solid #ccc">'+r.capacity+'</td><td style="padding:5px 8px;border:1px solid #ccc">'+rmS.length+'</td><td style="padding:5px 8px;border:1px solid #ccc;font-size:9pt">'+dayUsage+'</td></tr>';
    }).join('');
    return buildHeader('Room Usage Report')+'<table style="width:100%;border-collapse:collapse;font-size:9pt"><thead><tr><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Room</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Type</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Capacity</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Total Sessions</th><th style="background:#333;color:#fff;padding:6px 8px;border:1px solid #555">Mon/Tue/Wed/Thu/Fri</th></tr></thead><tbody>'+rows+'</tbody></table>'+buildFooter(signatories);
  };

  const openPreview=()=>{
    let html='',ttl='';
    if(reportType==='section'){html=buildSectionReport(selectedId);ttl='Section Schedule';}
    else if(reportType==='teacher'){html=buildTeacherReport(selectedId);ttl='Teacher Schedule';}
    else if(reportType==='load'){html=buildLoadReport();ttl='Teacher Load Report';}
    else{html=buildRoomReport();ttl='Room Usage Report';}
    if(!html){toast('Please select a valid target','error');return;}
    setPrintContent(html);setPrintTitle(ttl);setPrintOpen(true);
  };

  const exportCSV=()=>{
    let rows=[['Section','Subject','Teacher','Room','Day','Time Slot']];
    schedules.forEach(s=>{
      const sec=sections.find(x=>x.id===s.sectionId);
      const sub=subjects.find(x=>x.id===s.subjectId);
      const tch=teachers.find(x=>x.id===s.teacherId);
      const rm=rooms.find(x=>x.id===s.roomId);
      rows.push([sec?.name||'',sub?.name||'',tch?.name||'',rm?.name||'',s.day,s.timeSlot]);
    });
    const csv=rows.map(r=>r.map(c=>'"'+c+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='schedules.csv';a.click();
    toast('CSV exported','success');
  };

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Reports</h2>
          <p className="text-muted text-sm mt-8">DepEd-style printable reports</p>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-info btn-sm" onClick={exportCSV}>📥 Export CSV</button>
          <button className="btn btn-primary btn-sm" onClick={openPreview}>🖨 Print Preview</button>
        </div>
      </div>

      <div className="card mb-16">
        <div className="card-header"><span className="card-title">Report Configuration</span></div>
        <div className="grid-2">
          <div className="form-group"><label className="form-label">Report Type</label>
            <select className="form-select" value={reportType} onChange={e=>setReportType(e.target.value)}>
              <option value="section">Section Weekly Schedule</option>
              <option value="teacher">Teacher Weekly Schedule</option>
              <option value="load">Teacher Load Report</option>
              <option value="room">Room Usage Report</option>
            </select>
          </div>
          {(reportType==='section'||reportType==='teacher')&&(
            <div className="form-group"><label className="form-label">{reportType==='section'?'Section':'Teacher'}</label>
              <select className="form-select" value={selectedId} onChange={e=>setSelectedId(e.target.value)}>
                <option value="">— Select —</option>
                {(reportType==='section'?sections:teachers).map(x=><option key={x.id} value={x.id}>{x.name}</option>)}
              </select>
            </div>
          )}
        </div>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span className="card-title">Preview</span>
          <span className="text-muted text-xs">Click "Print Preview" to open full-screen printable view</span>
        </div>
        <div style={{background:'#555',padding:20}}>
          {(reportType==='section'?selectedId:reportType==='teacher'?selectedId:true)?
            <div dangerouslySetInnerHTML={{__html:
              reportType==='section'?buildSectionReport(selectedId):
              reportType==='teacher'?buildTeacherReport(selectedId):
              reportType==='load'?buildLoadReport():buildRoomReport()
            }} style={{maxWidth:800,margin:'0 auto'}}/>
            :<div style={{textAlign:'center',padding:40,color:'#aaa'}}>Select a section or teacher to preview</div>
          }
        </div>
      </div>

      <PrintPreviewModal open={printOpen} onClose={()=>setPrintOpen(false)} content={printContent} title={printTitle}/>
    </div>
  );
};

/* ===================== TEACHER MONITORING PAGE ===================== */
const TeacherMonitoringPage=({schedules,teachers,subjects,sections,timeSettings,setPage})=>{
  const getLoad=(t)=>{
    const teachHrs=schedules.filter(s=>s.teacherId===t.id).reduce((acc,s)=>{
      const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);
    },0);
    const rHrs=(t.responsibilities||[]).reduce((a,r)=>a+r.hoursPerWeek,0);
    const hrs=teachHrs+rHrs;
    const max=t.maxHoursPerWeek||30;
    const pct=Math.min(100,Math.round(hrs/max*100));
    const status=hrs>=max?'overloaded':pct>=80?'near':'ok';
    return{hrs,teachHrs,rHrs,max,pct,status};
  };
  const getDayLoad=(t)=>{
    const dl={};
    DAYS.forEach(d=>{
      const hrs=schedules.filter(s=>s.teacherId===t.id&&s.day===d).reduce((acc,s)=>{
        const p=parseSlotLabel(s.timeSlot);return acc+(p?(p.endMin-p.startMin)/60:0);
      },0);
      dl[d]=hrs;
    });
    return dl;
  };
  const getSubjectsTaught=(t)=>{
    const subIds=[...new Set(schedules.filter(s=>s.teacherId===t.id).map(s=>s.subjectId))];
    return subIds.map(id=>subjects.find(s=>s.id===id)).filter(Boolean);
  };
  const getSectionsTaught=(t)=>{
    const secIds=[...new Set(schedules.filter(s=>s.teacherId===t.id).map(s=>s.sectionId))];
    return secIds.map(id=>sections.find(s=>s.id===id)).filter(Boolean);
  };

  const overloaded=teachers.filter(t=>getLoad(t).status==='overloaded');
  const near=teachers.filter(t=>getLoad(t).status==='near');
  const ok=teachers.filter(t=>getLoad(t).status==='ok');

  const StatusBadge=({status})=>{
    const cfg={overloaded:{bg:'rgba(248,81,73,0.15)',color:'var(--danger)',border:'rgba(248,81,73,0.4)',label:'⚠ OVERLOADED'},
      near:{bg:'rgba(255,166,87,0.15)',color:'var(--accent5)',border:'rgba(255,166,87,0.4)',label:'⚡ NEAR LIMIT'},
      ok:{bg:'rgba(63,185,80,0.12)',color:'var(--accent3)',border:'rgba(63,185,80,0.35)',label:'✓ OK'}};
    const c=cfg[status];
    return<span style={{padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700,background:c.bg,color:c.color,border:'1px solid '+c.border}}>{c.label}</span>;
  };

  const TeacherCard=({t})=>{
    const ld=getLoad(t);
    const dl=getDayLoad(t);
    const subs=getSubjectsTaught(t);
    const secs=getSectionsTaught(t);
    const barColor=ld.status==='overloaded'?'var(--danger)':ld.status==='near'?'var(--accent5)':'var(--accent3)';
    return(
      <div style={{background:'var(--bg2)',border:'1px solid '+(ld.status==='overloaded'?'rgba(248,81,73,0.4)':ld.status==='near'?'rgba(255,166,87,0.3)':'var(--border)'),borderRadius:'var(--radius-lg)',padding:16,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
          <div>
            <div style={{fontWeight:800,fontFamily:'Syne',fontSize:15}}>{t.name}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{t.email}</div>
          </div>
          <StatusBadge status={ld.status}/>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:11,color:'var(--text2)'}}>Weekly Teaching Load</span>
            <span style={{fontSize:12,fontWeight:700,color:barColor}}>{ld.hrs.toFixed(1)}h / {ld.max}h ({ld.pct}%)</span>
          </div>
          <div style={{background:'var(--bg4)',borderRadius:6,height:10,overflow:'hidden'}}>
            <div style={{width:ld.pct+'%',height:10,background:barColor,borderRadius:6,transition:'width 0.3s'}}></div>
          </div>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {DAYS.map(d=>(
            <div key={d} style={{flex:1,background:'var(--bg3)',borderRadius:'var(--radius)',padding:'6px 4px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,marginBottom:3}}>{d.slice(0,3).toUpperCase()}</div>
              <div style={{fontSize:13,fontWeight:700,color:dl[d]>0?'var(--accent2)':'var(--text3)'}}>{dl[d]>0?dl[d].toFixed(1)+'h':'—'}</div>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:0.5}}>Subjects Taught</div>
            {subs.length>0
              ?subs.map(s=><span key={s.id} style={{display:'inline-block',fontSize:10,padding:'1px 6px',background:'rgba(88,166,255,0.1)',border:'1px solid rgba(88,166,255,0.25)',color:'var(--accent2)',borderRadius:10,marginRight:4,marginBottom:3}}>{s.name}</span>)
              :<span style={{fontSize:11,color:'var(--text3)'}}>None scheduled</span>}
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:0.5}}>Sections Handled</div>
            {secs.length>0
              ?secs.map(s=><span key={s.id} style={{display:'inline-block',fontSize:10,padding:'1px 6px',background:'rgba(210,168,255,0.1)',border:'1px solid rgba(210,168,255,0.25)',color:'var(--accent4)',borderRadius:10,marginRight:4,marginBottom:3}}>{s.name}</span>)
              :<span style={{fontSize:11,color:'var(--text3)'}}>None scheduled</span>}
          </div>
        </div>
        {ld.status==='overloaded'&&(
          <div style={{marginTop:10,padding:'7px 10px',background:'rgba(248,81,73,0.08)',border:'1px solid rgba(248,81,73,0.25)',borderRadius:6,fontSize:11,color:'var(--danger)'}}>
            ⚠ This teacher is over their maximum load by <strong>{(ld.hrs-ld.max).toFixed(1)}h</strong>.
            <button className="btn btn-xs btn-secondary" style={{marginLeft:8,fontSize:10}} onClick={()=>setPage('teachers')}>→ Edit in Teachers</button>
          </div>
        )}
      </div>
    );
  };

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Teacher Load Monitoring</h2>
          <p className="text-muted text-sm mt-8">Track teaching hours, spot overloads, and manage capacity</p>
        </div>
        <div style={{display:'flex',gap:10}}>
          {[{label:'Overloaded',count:overloaded.length,color:'var(--danger)',bg:'rgba(248,81,73,0.1)'},
            {label:'Near Limit',count:near.length,color:'var(--accent5)',bg:'rgba(255,166,87,0.1)'},
            {label:'OK',count:ok.length,color:'var(--accent3)',bg:'rgba(63,185,80,0.1)'}
          ].map(s=>(
            <div key={s.label} style={{padding:'6px 14px',background:s.bg,borderRadius:'var(--radius)',border:'1px solid',borderColor:s.color+'55',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.count}</div>
              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {overloaded.length>0&&(
        <div style={{background:'rgba(248,81,73,0.08)',border:'1px solid rgba(248,81,73,0.35)',borderRadius:'var(--radius-lg)',padding:'10px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>⚠</span>
          <div>
            <div style={{fontWeight:700,color:'var(--danger)',fontSize:13}}>{overloaded.length} teacher{overloaded.length>1?'s are':' is'} overloaded</div>
            <div style={{fontSize:11,color:'var(--text2)'}}>These teachers are hidden from the Add Schedule dropdown. Increase their max hours in the Teachers page to re-enable them.</div>
          </div>
        </div>
      )}

      {overloaded.length>0&&(<div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:'var(--danger)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>⚠ Overloaded ({overloaded.length})</div>{overloaded.map(t=><TeacherCard key={t.id} t={t}/>)}</div>)}
      {near.length>0&&(<div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:700,color:'var(--accent5)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>⚡ Near Limit — 80%+ ({near.length})</div>{near.map(t=><TeacherCard key={t.id} t={t}/>)}</div>)}
      {ok.length>0&&(<div><div style={{fontSize:11,fontWeight:700,color:'var(--accent3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>✓ Within Limit ({ok.length})</div>{ok.map(t=><TeacherCard key={t.id} t={t}/>)}</div>)}
    </div>
  );
};

/* ===================== TIME SETTINGS PAGE ===================== */
const TimeSettingsPage=({timeSettings,setTimeSettings,toast})=>{
  const initLocal=()=>({
    ...timeSettings,
    breaks:timeSettings.breaks&&timeSettings.breaks.length>0?timeSettings.breaks:[
      {id:'b1',label:'Lunch Break',startHour:12,startMinute:0,durationMinutes:60,enabled:true}
    ]
  });
  const [local,setLocal]=useState(initLocal);
  const slots=useMemo(()=>generateTimeSlots(local),[local]);

  const toTimeStr=(h,m)=>(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  const fromTimeStr=(s)=>{const[h,m]=s.split(':');return{h:+h,m:+m};};

  const QUICK_DURATIONS=[15,20,30,45,60,90];
  const BREAK_ICONS={'Lunch Break':'🍱','Morning Break':'☕','Afternoon Break':'🫖','Recess':'🏃'};
  const getIcon=(label)=>BREAK_ICONS[label]||'⏸';

  const save=()=>{
    if(local.startHour*60+local.startMinute>=local.endHour*60+local.endMinute){
      toast('End time must be after start time','error');return;
    }
    const mainBreak=local.breaks.find(b=>b.enabled);
    const updated={...local,
      lunchEnabled:local.breaks.some(b=>b.enabled),
      lunchStartHour:mainBreak?mainBreak.startHour:12,
      lunchStartMinute:mainBreak?mainBreak.startMinute:0,
      lunchEndHour:mainBreak?mainBreak.startHour+Math.floor((mainBreak.startMinute+mainBreak.durationMinutes)/60):13,
      lunchEndMinute:mainBreak?(mainBreak.startMinute+mainBreak.durationMinutes)%60:0,
    };
    setTimeSettings(updated);
    toast('Time settings saved','success');
  };

  const updateBreak=(id,field,val)=>{
    setLocal(v=>({...v,breaks:v.breaks.map(b=>b.id===id?{...b,[field]:val}:b)}));
  };

  const addBreak=()=>{
    const newB={id:'b'+Date.now(),label:'Break',startHour:10,startMinute:0,durationMinutes:30,enabled:true};
    setLocal(v=>({...v,breaks:[...v.breaks,newB]}));
  };

  const removeBreak=(id)=>{
    setLocal(v=>({...v,breaks:v.breaks.filter(b=>b.id!==id)}));
  };

  const totalBreakMin=local.breaks.filter(b=>b.enabled).reduce((a,b)=>a+b.durationMinutes,0);
  const schoolDayMin=local.endHour*60+local.endMinute-(local.startHour*60+local.startMinute);
  const teachingMin=schoolDayMin-totalBreakMin;

  return(
    <div className="page-content">
      <div className="flex items-center justify-between mb-16">
        <div>
          <h2 style={{fontFamily:'Syne',fontSize:18,fontWeight:800}}>Time Settings</h2>
          <p className="text-muted text-sm mt-8">Configure school hours, period duration, and break times</p>
        </div>
        <button className="btn btn-primary" onClick={save}>💾 Save Settings</button>
      </div>

      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        {[
          {label:'School Day',val:fmtTime(local.startHour*60+local.startMinute)+' – '+fmtTime(local.endHour*60+local.endMinute),color:'var(--accent2)'},
          {label:'Total Hours',val:Math.floor(schoolDayMin/60)+'h '+(schoolDayMin%60)+'m',color:'var(--accent3)'},
          {label:'Break Time',val:totalBreakMin+'m',color:'var(--accent5)'},
          {label:'Teaching Time',val:Math.floor(teachingMin/60)+'h '+(teachingMin%60)+'m',color:'var(--accent4)'},
          {label:'Slots/Day',val:slots.length,color:'var(--accent)'},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'10px 16px',flex:1,minWidth:120}}>
            <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,fontWeight:700,marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:18,fontWeight:800,fontFamily:'Syne',color:s.color}}>{s.val}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="card">
          <div className="card-header"><span className="card-title">🏫 School Day Hours</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div className="form-group">
              <label className="form-label">Start Time</label>
              <input type="time" className="form-input"
                value={toTimeStr(local.startHour,local.startMinute)}
                onChange={e=>{const{h,m}=fromTimeStr(e.target.value);setLocal(v=>({...v,startHour:h,startMinute:m}));}}
                style={{fontSize:16,fontWeight:700,letterSpacing:1}}
              />
            </div>
            <div className="form-group">
              <label className="form-label">End Time</label>
              <input type="time" className="form-input"
                value={toTimeStr(local.endHour,local.endMinute)}
                onChange={e=>{const{h,m}=fromTimeStr(e.target.value);setLocal(v=>({...v,endHour:h,endMinute:m}));}}
                style={{fontSize:16,fontWeight:700,letterSpacing:1}}
              />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Period Duration</label>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
              {QUICK_DURATIONS.map(d=>(
                <button key={d}
                  className={'btn btn-sm '+(local.defaultSlotMinutes===d?'btn-primary':'btn-secondary')}
                  onClick={()=>setLocal(v=>({...v,defaultSlotMinutes:d}))}
                  style={{minWidth:52,fontWeight:700}}
                >{d} min</button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="number" className="form-input" value={local.defaultSlotMinutes}
                onChange={e=>setLocal(v=>({...v,defaultSlotMinutes:Math.max(10,Math.min(180,+e.target.value))}))}
                min={10} max={180} style={{width:90,fontWeight:700,fontSize:15}}
              />
              <span className="text-muted text-sm">minutes per period</span>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">⏸ Break Times</span>
            <button className="btn btn-success btn-xs" onClick={addBreak}>+ Add Break</button>
          </div>
          {local.breaks.length===0&&(
            <div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:13}}>
              No breaks configured. Click "+ Add Break" to add one.
            </div>
          )}
          {local.breaks.map((brk)=>{
            const endMin=(brk.startHour*60+brk.startMinute+brk.durationMinutes);
            const endH=Math.floor(endMin/60);
            const endM=endMin%60;
            return(
              <div key={brk.id} style={{
                background:brk.enabled?'rgba(255,166,87,0.07)':'var(--bg3)',
                border:'1px solid '+(brk.enabled?'rgba(255,166,87,0.3)':'var(--border)'),
                borderRadius:'var(--radius)',padding:12,marginBottom:10
              }}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{fontSize:18}}>{getIcon(brk.label)}</span>
                  <input className="form-input" value={brk.label} onChange={e=>updateBreak(brk.id,'label',e.target.value)} style={{flex:1,fontWeight:700,fontSize:13}} placeholder="Break name"/>
                  <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>
                    <input type="checkbox" checked={brk.enabled} onChange={e=>updateBreak(brk.id,'enabled',e.target.checked)} style={{accentColor:'var(--accent5)'}}/> Enable
                  </label>
                  <button className="btn btn-danger btn-xs" onClick={()=>removeBreak(brk.id)}>✕</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div>
                    <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:4,fontWeight:600}}>Start Time</div>
                    <input type="time" className="form-input"
                      value={toTimeStr(brk.startHour,brk.startMinute)}
                      onChange={e=>{const{h,m}=fromTimeStr(e.target.value);updateBreak(brk.id,'startHour',h);updateBreak(brk.id,'startMinute',m);}}
                      style={{fontWeight:700,fontSize:14}}
                    />
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:4,fontWeight:600}}>Duration</div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {[15,20,30,45,60].map(d=>(
                        <button key={d} className={'btn btn-xs '+(brk.durationMinutes===d?'btn-warn':'btn-secondary')} onClick={()=>updateBreak(brk.id,'durationMinutes',d)} style={{fontWeight:700}}>{d}m</button>
                      ))}
                    </div>
                    <input type="number" className="form-input" value={brk.durationMinutes}
                      onChange={e=>updateBreak(brk.id,'durationMinutes',Math.max(5,Math.min(120,+e.target.value)))}
                      min={5} max={120} style={{marginTop:6,width:80,fontWeight:700}}
                    />
                  </div>
                </div>
                {brk.enabled&&(
                  <div style={{fontSize:11,color:'var(--accent5)',fontWeight:600,background:'rgba(255,166,87,0.1)',padding:'3px 8px',borderRadius:4,display:'inline-block'}}>
                    {getIcon(brk.label)} {fmtTime(brk.startHour*60+brk.startMinute)} – {fmtTime(endH*60+endM)} ({brk.durationMinutes} min)
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">📋 Time Slot Preview</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className="tag tag-blue">{slots.length} teaching slots</span>
            <span className="tag tag-orange">{local.breaks.filter(b=>b.enabled).length} break(s)</span>
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {(()=>{
            const allBlocks=[];
            slots.forEach(sl=>allBlocks.push({type:'slot',label:sl.label,start:sl.startMin}));
            local.breaks.filter(b=>b.enabled).forEach(b=>{
              const s=b.startHour*60+b.startMinute;
              allBlocks.push({type:'break',label:getIcon(b.label)+' '+b.label+' ('+b.durationMinutes+'m)',start:s});
            });
            allBlocks.sort((a,bk)=>a.start-bk.start);
            return allBlocks.map((bl,i)=>(
              <div key={i} style={{
                padding:'5px 12px',
                background:bl.type==='break'?'rgba(255,166,87,0.15)':'var(--bg3)',
                border:'1px solid '+(bl.type==='break'?'rgba(255,166,87,0.4)':'var(--border)'),
                borderRadius:'var(--radius)',
                fontSize:11,
                fontFamily:bl.type==='slot'?'monospace':'inherit',
                color:bl.type==='break'?'var(--accent5)':'var(--text2)',
                fontWeight:bl.type==='break'?700:400
              }}>{bl.label}</div>
            ));
          })()}
        </div>
      </div>
    </div>
  );
};

/* ===================== LOGO EDITOR COMPONENT ===================== */
const LogoEditor=({label,fallback,imgData,onFallbackChange,onImgChange,fallbackPlaceholder})=>{
  const fileRef=useRef();
  const handleFile=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){alert('Please select an image file');return;}
    if(file.size>2*1024*1024){alert('Image too large. Please use an image under 2MB.');return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{onImgChange(ev.target.result);};
    reader.readAsDataURL(file);
    e.target.value='';
  };
  return(
    <div className="form-group">
      <label className="form-label">{label}</label>
      <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:12,display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:80,background:'var(--bg)',borderRadius:'var(--radius)',border:'1px dashed var(--border)',overflow:'hidden'}}>
          {imgData?<img src={imgData} style={{maxHeight:72,maxWidth:120,objectFit:'contain'}} alt="logo preview"/>:<span style={{fontSize:40,lineHeight:1}}>{fallback||fallbackPlaceholder}</span>}
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-info btn-sm" style={{flex:1}} onClick={()=>fileRef.current.click()}>📁 {imgData?'Replace Image':'Upload Image'}</button>
          {imgData&&<button className="btn btn-danger btn-sm" onClick={()=>onImgChange('')}>✕</button>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        <div>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.5,fontWeight:600}}>{imgData?'Fallback (if no image)':'Emoji or Text'}</div>
          <input className="form-input" value={fallback} onChange={e=>onFallbackChange(e.target.value)} placeholder={fallbackPlaceholder} style={{fontSize:16}}/>
        </div>
        {imgData&&<div style={{fontSize:10,color:'var(--accent3)',padding:'4px 8px',background:'rgba(63,185,80,0.08)',borderRadius:4,border:'1px solid rgba(63,185,80,0.2)'}}>✓ Image uploaded · will appear in printed reports</div>}
      </div>
    </div>
  );
};

/* ===================== REPORT SETTINGS PAGE ===================== */
const ReportSettingsPage=({settings,setSettings,signatories,setSignatories,toast})=>{
  const [local,setLocal]=useState({...settings});
  const [editSig,setEditSig]=useState(null);
  const emptySig={id:'',name:'',position:'',title:'',order:signatories.length+1};

  const save=()=>{setSettings({...local});toast('Settings saved','success');};

  const saveSig=()=>{

};
